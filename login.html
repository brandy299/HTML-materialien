<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4F46E5;
  --primary-hover: #4338CA;
  --text: #1E1B4B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8F7FF;
  --error: #EF4444;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(79,70,229,0.13);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 2.5rem;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
  text-align: center;
}

.logo {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.25rem;
}

h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.35rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}

.subtitle {
  font-size: 0.84rem;
  color: var(--text-muted);
  margin-bottom: 2rem;
  line-height: 1.5;
}

.field { text-align: left; margin-bottom: 1rem; }

label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 0.35rem;
}

input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 200ms;
}

input:focus { border-color: var(--primary); }
input.err-input { border-color: var(--error); }

.err-msg {
  font-size: 0.78rem;
  color: var(--error);
  margin-top: 0.4rem;
  min-height: 1.1rem;
  display: block;
}

.btn {
  width: 100%;
  padding: 0.875rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 200ms, opacity 200ms;
  margin-top: 0.5rem;
}

.btn:hover { background: var(--primary-hover); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.back-link {
  display: block;
  margin-top: 1.25rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
}

.back-link:hover { color: var(--primary); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>Lehrkraft-Login</h1>
  <p class="subtitle">Für Lehrkräfte &amp; Admin-Bereich.<br>Zugangsdaten bekommst du von deiner Schuladmin.</p>

  <div class="field">
    <label for="email">E-Mail</label>
    <input type="email" id="email" placeholder="name@schule.de" autocomplete="email">
  </div>

  <div class="field">
    <label for="password">Passwort</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <span class="err-msg" id="err-msg"></span>
  </div>

  <button class="btn" id="login-btn" onclick="login()">Einloggen</button>

  <a href="index.html" class="back-link">← Zurück zur Hauptseite</a>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://yodanvzkkhlqemlvtvey.supabase.co',
  'sb_publishable_MnsZVbYHDBQglcv3wPacvg_mkXwOl7R'
);

// Already logged in → go straight to dashboard
const { data: { session } } = await supabase.auth.getSession();
if (session) window.location.href = 'dashboard.html';

window.login = async function() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('err-msg');
  const btn      = document.getElementById('login-btn');

  errEl.textContent = '';
  if (!email || !password) {
    errEl.textContent = 'Bitte E-Mail und Passwort eingeben.';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Wird eingeloggt...';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Falsche E-Mail oder falsches Passwort.';
    btn.disabled    = false;
    btn.textContent = 'Einloggen';
  } else {
    window.location.href = 'dashboard.html';
  }
};

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.login();
});
</script>
</body>
</html>
