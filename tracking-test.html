<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telephoning Quiz – Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4F46E5;
  --primary-hover: #4338CA;
  --text: #1E1B4B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8F7FF;
  --white: #ffffff;
  --success: #10B981;
  --error: #EF4444;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(79,70,229,0.13), 0 1px 4px rgba(0,0,0,0.06);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 2.5rem;
  max-width: 560px;
  width: 100%;
  box-shadow: var(--shadow);
}

.badge {
  display: inline-block;
  background: #EEF2FF;
  color: var(--primary);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 1rem;
  letter-spacing: 0.02em;
}

h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.subtitle {
  font-size: 0.875rem;
  color: var(--text-muted);
  margin-bottom: 2rem;
  line-height: 1.5;
}

label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.4rem;
}

input[type="text"] {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 200ms;
  margin-bottom: 0.4rem;
}

input[type="text"]:focus { border-color: var(--primary); }

.hint {
  font-size: 0.74rem;
  color: var(--text-muted);
  margin-bottom: 1.75rem;
}

.btn {
  width: 100%;
  padding: 0.875rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 200ms;
}

.btn:hover { background: var(--primary-hover); }
.btn:disabled { background: #A5B4FC; cursor: not-allowed; }

.btn-outline {
  background: white;
  color: var(--primary);
  border: 1.5px solid var(--primary);
}

.btn-outline:hover { background: #EEF2FF; }

/* Progress */
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.progress-meta-label { font-size: 0.75rem; color: var(--text-muted); }

.progress-bar {
  height: 5px;
  background: #EEF2FF;
  border-radius: 100px;
  margin-bottom: 2rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 100px;
  transition: width 350ms ease;
}

/* Question */
.question-text {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 1.25rem;
  line-height: 1.6;
}

.options { display: flex; flex-direction: column; gap: 0.6rem; }

.option {
  padding: 0.85rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 180ms;
  background: white;
  line-height: 1.4;
}

.option:hover { border-color: var(--primary); background: #F5F3FF; }
.option.selected { border-color: var(--primary); background: #EEF2FF; color: var(--primary); font-weight: 600; }

.nav-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.5rem;
}

.nav-row .btn { flex: 1; }

/* Result */
.score-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.score-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  box-shadow: 0 8px 24px rgba(79,70,229,0.3);
}

.score-number {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1;
}

.score-sub { font-size: 0.65rem; opacity: 0.75; margin-top: 2px; }

.result-center { text-align: center; margin-bottom: 2rem; }

.result-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 0.35rem;
}

.result-detail { font-size: 0.85rem; color: var(--text-muted); }

.save-status {
  text-align: center;
  font-size: 0.8rem;
  padding: 0.5rem;
  border-radius: 8px;
  margin-bottom: 1.25rem;
}

.save-status.saving { color: var(--text-muted); }
.save-status.ok { color: var(--success); background: #ECFDF5; font-weight: 600; }
.save-status.err { color: var(--error); background: #FEF2F2; }

/* Sections */
.sec { display: none; }
.sec.active { display: block; }
</style>
</head>
<body>

<div class="card">

  <!-- Schritt 1: Code -->
  <div class="sec active" id="sec-code">
    <div class="badge">Englisch B2 · Telephoning</div>
    <h1>Telephoning Quiz</h1>
    <p class="subtitle">Gib deinen persönlichen Code ein — deine Lehrkraft hat ihn dir gegeben.</p>
    <label for="code-input">Dein Code</label>
    <input type="text" id="code-input" placeholder="z.B. BK24a-07" maxlength="20" autocomplete="off">
    <div class="hint">Der Code besteht aus deiner Klasse und einer Nummer, z.B. BK24a-07.</div>
    <button class="btn" onclick="startQuiz()">Quiz starten →</button>
  </div>

  <!-- Schritt 2: Quiz -->
  <div class="sec" id="sec-quiz">
    <div class="badge" id="quiz-badge">Frage 1 / 5</div>
    <div class="progress-meta">
      <span class="progress-meta-label" id="progress-label">Frage 1 von 5</span>
      <span class="progress-meta-label" id="answered-label">0 beantwortet</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="btn-prev" onclick="prevQ()" style="display:none">← Zurück</button>
      <button class="btn" id="btn-next" onclick="nextQ()" disabled>Weiter →</button>
    </div>
  </div>

  <!-- Schritt 3: Ergebnis -->
  <div class="sec" id="sec-result">
    <div class="score-wrap">
      <div class="score-circle">
        <div class="score-number" id="score-pct">—</div>
        <div class="score-sub">Score</div>
      </div>
    </div>
    <div class="result-center">
      <div class="result-title" id="result-title">—</div>
      <div class="result-detail" id="result-detail">—</div>
    </div>
    <div class="save-status saving" id="save-status">Ergebnis wird gespeichert...</div>
    <button class="btn btn-outline" onclick="restart()" style="margin-bottom:0.75rem">Nochmal versuchen</button>
    <button class="btn" onclick="window.location='index.html'">Zurück zur Übersicht</button>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://yodanvzkkhlqemlvtvey.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MnsZVbYHDBQglcv3wPacvg_mkXwOl7R';
const MATERIAL    = 'telephoning-quiz-test';

const QUESTIONS = [
  {
    q: 'You want to speak to Mr. Smith but he is not available. What do you say?',
    opts: ['Could I leave a message, please?', 'I want to talk to Mr. Smith now.', 'Where is Mr. Smith?', 'Give me Mr. Smith.'],
    correct: 0
  },
  {
    q: 'The caller asks: "Could you put me through to the sales department?" You reply:',
    opts: ['One moment please, I\'ll transfer you.', 'Sales is not here.', 'Why do you want to call sales?', 'Call again later.'],
    correct: 0
  },
  {
    q: 'How do you politely ask someone to speak more slowly?',
    opts: ['Speak slowly!', 'I can\'t understand you.', 'Could you speak a bit more slowly, please?', 'You are too fast.'],
    correct: 2
  },
  {
    q: 'You want to confirm a meeting by phone. You say:',
    opts: ['I just wanted to confirm our meeting on Thursday at 3 pm.', 'Is our meeting still on?', 'Don\'t forget our meeting!', 'We have a meeting, right?'],
    correct: 0
  },
  {
    q: 'How do you end a business phone call politely?',
    opts: ['Goodbye.', 'I have to go now, bye.', 'Thank you for calling. Have a great day. Goodbye.', 'That\'s all, bye.'],
    correct: 2
  }
];

let code = '';
let cur  = 0;
let ans  = Array(QUESTIONS.length).fill(null);

function show(id) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  const v = document.getElementById('code-input').value.trim();
  if (!v) { document.getElementById('code-input').focus(); return; }
  code = v;
  localStorage.setItem('studentCode', v);
  cur = 0;
  ans = Array(QUESTIONS.length).fill(null);
  renderQ();
  show('sec-quiz');
}

function renderQ() {
  const q   = QUESTIONS[cur];
  const tot = QUESTIONS.length;
  document.getElementById('quiz-badge').textContent     = `Frage ${cur + 1} / ${tot}`;
  document.getElementById('progress-label').textContent = `Frage ${cur + 1} von ${tot}`;
  document.getElementById('answered-label').textContent = `${ans.filter(a => a !== null).length} beantwortet`;
  document.getElementById('progress-fill').style.width  = `${((cur + 1) / tot) * 100}%`;
  document.getElementById('question-text').textContent  = q.q;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.opts.forEach((o, i) => {
    const el = document.createElement('div');
    el.className = 'option' + (ans[cur] === i ? ' selected' : '');
    el.textContent = o;
    el.onclick = () => pick(i);
    container.appendChild(el);
  });

  document.getElementById('btn-prev').style.display = cur > 0 ? '' : 'none';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = cur === tot - 1 ? 'Abschicken ✓' : 'Weiter →';
  btnNext.disabled    = ans[cur] === null;
}

function pick(i) {
  ans[cur] = i;
  document.querySelectorAll('.option').forEach((el, idx) => el.classList.toggle('selected', idx === i));
  document.getElementById('btn-next').disabled = false;
  document.getElementById('answered-label').textContent = `${ans.filter(a => a !== null).length} beantwortet`;
}

function nextQ() {
  if (cur < QUESTIONS.length - 1) { cur++; renderQ(); }
  else submitQuiz();
}

function prevQ() {
  if (cur > 0) { cur--; renderQ(); }
}

function submitQuiz() {
  const correct = ans.filter((a, i) => a === QUESTIONS[i].correct).length;
  const score   = Math.round((correct / QUESTIONS.length) * 100);

  document.getElementById('score-pct').textContent  = score + '%';
  document.getElementById('result-detail').textContent = `${correct} von ${QUESTIONS.length} Fragen richtig · Code: ${code}`;

  const titles = [[80, 'Ausgezeichnet!'], [60, 'Gut gemacht!'], [40, 'Weiter üben!'], [0, 'Nicht aufgeben!']];
  document.getElementById('result-title').textContent = (titles.find(([t]) => score >= t) || titles.at(-1))[1];

  show('sec-result');
  saveResult(score, correct);
}

async function saveResult(score, correct) {
  const el = document.getElementById('save-status');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/progress`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        code,
        material: MATERIAL,
        score,
        completed: true,
        details: { correct, total: QUESTIONS.length, answers: ans }
      })
    });
    if (res.ok) {
      el.className = 'save-status ok';
      el.textContent = '✓ Ergebnis wurde gespeichert';
    } else {
      throw new Error();
    }
  } catch {
    el.className = 'save-status err';
    el.textContent = 'Fehler beim Speichern — bitte Lehrkraft informieren.';
  }
}

function restart() {
  cur = 0;
  ans = Array(QUESTIONS.length).fill(null);
  show('sec-code');
  document.getElementById('code-input').value = code;
}

window.onload = () => {
  const saved = localStorage.getItem('studentCode');
  if (saved) document.getElementById('code-input').value = saved;
};
</script>
</body>
</html>
