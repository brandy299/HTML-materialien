<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4F46E5;
  --primary-hover: #4338CA;
  --text: #1E1B4B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8F7FF;
  --white: #fff;
  --success: #10B981;
  --warning: #F59E0B;
  --error: #EF4444;
  --radius: 12px;
  --shadow-sm: 0 2px 8px rgba(79,70,229,0.08);
  --shadow: 0 4px 20px rgba(79,70,229,0.1);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Login ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.login-card {
  background: white;
  border-radius: 20px;
  padding: 2.5rem;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
  text-align: center;
}

.login-icon {
  width: 56px; height: 56px;
  background: #EEF2FF;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.25rem;
  color: var(--primary);
}

.login-card h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.35rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}

.login-card p {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 1.75rem;
}

.login-card input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  margin-bottom: 0.75rem;
  transition: border-color 200ms;
}

.login-card input:focus { border-color: var(--primary); }

.login-card .err {
  font-size: 0.8rem;
  color: var(--error);
  margin-bottom: 0.75rem;
  min-height: 1rem;
}

.btn {
  width: 100%;
  padding: 0.85rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 200ms;
}

.btn:hover { background: var(--primary-hover); }

/* ── Dashboard ── */
#dashboard { display: none; }

header {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.logo-badge {
  width: 32px; height: 32px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
}

.header-right { display: flex; align-items: center; gap: 1rem; }

.refresh-info {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.refresh-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.btn-sm {
  padding: 0.4rem 0.85rem;
  font-size: 0.78rem;
  width: auto;
  border-radius: 8px;
}

.main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.75rem;
}

.stat-card {
  background: white;
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(226,232,240,0.8);
}

.stat-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}

.stat-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.stat-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}

/* Filters */
.toolbar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.toolbar-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  flex: 1;
}

.filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.filter-btn {
  padding: 0.35rem 0.85rem;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 180ms;
}

.filter-btn:hover { border-color: var(--primary); color: var(--primary); }
.filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

/* Table */
.table-wrap {
  background: white;
  border-radius: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(226,232,240,0.8);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead tr {
  background: #F8F7FF;
  border-bottom: 1.5px solid var(--border);
}

th {
  padding: 0.75rem 1rem;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  text-align: left;
  white-space: nowrap;
}

td {
  padding: 0.85rem 1rem;
  font-size: 0.85rem;
  border-bottom: 1px solid rgba(226,232,240,0.6);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #FAFAFE; }

.code-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  font-weight: 700;
  background: #EEF2FF;
  color: var(--primary);
  padding: 3px 10px;
  border-radius: 6px;
  display: inline-block;
}

.material-name {
  font-size: 0.83rem;
  color: var(--text);
  font-weight: 500;
}

/* Score bar */
.score-wrap { display: flex; align-items: center; gap: 0.6rem; min-width: 120px; }

.score-bar-bg {
  flex: 1;
  height: 6px;
  background: #E2E8F0;
  border-radius: 100px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 400ms ease;
}

.score-text {
  font-size: 0.82rem;
  font-weight: 700;
  min-width: 38px;
  text-align: right;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
}

.pill-done { background: #ECFDF5; color: #065F46; }
.pill-open { background: #FEF3C7; color: #92400E; }

.time-text { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}

.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-text { font-size: 0.9rem; }

.loading-row td { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }

/* Section */
.sec { display: none; }
.sec.active { display: block; }
</style>
</head>
<body>

<!-- Dashboard (shown after auth check) -->
<div id="dashboard" style="display:none">
  <header>
    <div class="header-left">
      <div class="logo-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
        </svg>
      </div>
      <span class="header-title">Teacher Dashboard</span>
    </div>
    <div class="header-right">
      <div class="refresh-info">
        <div class="refresh-dot"></div>
        <span id="last-update">—</span>
      </div>
      <a href="codegenerator.html" class="btn btn-sm" style="text-decoration:none">Codegenerator</a>
      <button class="btn btn-sm" onclick="loadData()">Aktualisieren</button>
      <button class="btn btn-sm" id="btn-logout" style="background:white;color:var(--text-muted);border:1.5px solid var(--border);">Abmelden</button>
    </div>
  </header>

  <div class="main">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Einreichungen</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">gesamt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aktive SuS</div>
        <div class="stat-value" id="stat-students">—</div>
        <div class="stat-sub">verschiedene Codes</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ø Score</div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-sub">Klassendurchschnitt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Materialien</div>
        <div class="stat-value" id="stat-materials">—</div>
        <div class="stat-sub">genutzte Seiten</div>
      </div>
    </div>

    <!-- Table -->
    <div class="toolbar">
      <div class="toolbar-title">Alle Ergebnisse</div>
      <div class="filter-group" id="class-filters">
        <button class="filter-btn active" data-class="all" onclick="setFilter('all', this)">Alle</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Material</th>
            <th>Score</th>
            <th>Status</th>
            <th>Zeitpunkt</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr class="loading-row"><td colspan="5">Lade Daten...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://yodanvzkkhlqemlvtvey.supabase.co',
  'sb_publishable_MnsZVbYHDBQglcv3wPacvg_mkXwOl7R'
);

let allData      = [];
let activeFilter = 'all';
let refreshTimer = null;

/* ── Auth ── */
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  window.location.href = 'login.html';
} else {
  document.getElementById('dashboard').style.display = 'block';
  loadData();
  refreshTimer = setInterval(loadData, 30000);
}

document.getElementById('btn-logout').onclick = async () => {
  clearInterval(refreshTimer);
  await supabase.auth.signOut();
  window.location.href = 'login.html';
};

/* ── Data ── */
async function loadData() {
  try {
    const { data, error } = await supabase
      .from('progress')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(200);

    if (error) throw error;
    allData = data;
    updateStats();
    updateFilters();
    renderTable();
    document.getElementById('last-update').textContent =
      'Zuletzt: ' + new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch (e) {
    document.getElementById('results-body').innerHTML =
      '<tr class="loading-row"><td colspan="5">Fehler beim Laden der Daten.</td></tr>';
  }
}

function updateStats() {
  const scores   = allData.filter(r => r.score !== null).map(r => r.score);
  const avg      = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : '—';
  const students = new Set(allData.map(r => r.code)).size;
  const mats     = new Set(allData.map(r => r.material)).size;

  document.getElementById('stat-total').textContent     = allData.length;
  document.getElementById('stat-students').textContent  = students;
  document.getElementById('stat-avg').textContent       = avg + (scores.length ? '%' : '');
  document.getElementById('stat-materials').textContent = mats;
}

function updateFilters() {
  const classes = [...new Set(allData.map(r => r.code.split('-')[0]))].sort();
  const container = document.getElementById('class-filters');

  // Keep "Alle" button, rebuild class buttons
  container.innerHTML = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-class="all" onclick="setFilter('all', this)">Alle</button>`;
  classes.forEach(cls => {
    const btn = document.createElement('button');
    btn.className = `filter-btn ${activeFilter === cls ? 'active' : ''}`;
    btn.dataset.class = cls;
    btn.textContent = cls;
    btn.onclick = () => setFilter(cls, btn);
    container.appendChild(btn);
  });
}

function setFilter(cls, btn) {
  activeFilter = cls;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const filtered = activeFilter === 'all'
    ? allData
    : allData.filter(r => r.code.startsWith(activeFilter));

  const tbody = document.getElementById('results-body');

  if (!filtered.length) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">Noch keine Einreichungen</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const score     = r.score !== null ? r.score : null;
    const scoreColor = score >= 80 ? '#10B981' : score >= 60 ? '#F59E0B' : '#EF4444';
    const scoreBar  = score !== null
      ? `<div class="score-wrap">
           <div class="score-bar-bg"><div class="score-bar-fill" style="width:${score}%;background:${scoreColor}"></div></div>
           <span class="score-text" style="color:${scoreColor}">${score}%</span>
         </div>`
      : '<span style="color:var(--text-muted);font-size:0.78rem">—</span>';

    const pill = r.completed
      ? '<span class="status-pill pill-done">✓ Fertig</span>'
      : '<span class="status-pill pill-open">In Bearbeitung</span>';

    const time = new Date(r.created_at).toLocaleString('de-DE', {
      day: '2-digit', month: '2-digit', year: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });

    return `<tr>
      <td><span class="code-chip">${esc(r.code)}</span></td>
      <td><span class="material-name">${esc(r.material)}</span></td>
      <td>${scoreBar}</td>
      <td>${pill}</td>
      <td><span class="time-text">${time}</span></td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// expose setFilter for inline onclick
window.setFilter  = setFilter;
window.loadData   = loadData;
</script>
</body>
</html>
