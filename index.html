<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterricht.Digital – Materialien</title>
<link rel="stylesheet" href="styles/design-system.css">
<style>
:root {
  /* Fach color tokens mapped to design system */
  --fc-0-color: var(--primary-500);
  --fc-0-light: var(--primary-50);
  --fc-0-bg: var(--primary-50);

  --fc-1-color: oklch(65% 0.14 200);
  --fc-1-light: oklch(97% 0.02 200);
  --fc-1-bg: oklch(97% 0.02 200);

  --fc-2-color: var(--accent-500);
  --fc-2-light: var(--accent-50);
  --fc-2-bg: var(--accent-50);

  --fc-3-color: oklch(55% 0.18 300);
  --fc-3-light: oklch(97% 0.02 300);
  --fc-3-bg: oklch(97% 0.02 300);

  --fc-4-color: oklch(55% 0.16 250);
  --fc-4-light: oklch(97% 0.02 250);
  --fc-4-bg: oklch(97% 0.02 250);

  --fc-5-color: oklch(60% 0.18 340);
  --fc-5-light: oklch(97% 0.02 340);
  --fc-5-bg: oklch(97% 0.02 340);

  --fc-6-color: var(--success-500);
  --fc-6-light: var(--success-50);
  --fc-6-bg: var(--success-50);

  --fc-7-color: var(--warning-500);
  --fc-7-light: var(--warning-50);
  --fc-7-bg: var(--warning-50);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: var(--text-base);
  line-height: var(--leading-normal);
}

/* ---- MOBILE HEADER ---- */
#app-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--primary-950);
  padding: var(--space-2) var(--space-3);
  align-items: center;
  gap: var(--space-2);
  border-bottom: 1px solid var(--primary-900);
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex: 1;
  min-width: 0;
}

.logo-icon {
  width: 28px; height: 28px;
  background: var(--primary-500);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-text {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--text-inverse);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-spacer { flex: 1; }

#searchWrap {
  position: relative;
  flex: 1;
  min-width: 120px;
  max-width: 240px;
}

#searchWrap svg {
  position: absolute;
  left: var(--space-2); top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: var(--space-1) var(--space-2) var(--space-1) 28px;
  border: 1px solid var(--primary-800);
  background: var(--primary-900);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-family: inherit;
  color: var(--text-inverse);
  outline: none;
  transition: border-color 150ms;
}

#search::placeholder { color: var(--text-muted); }
#search:focus { border-color: var(--primary-400); }

.hbtn {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-2);
  border: 1px solid var(--primary-800);
  background: var(--primary-900);
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-size: var(--text-xs);
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 150ms;
}

.hbtn:hover { color: var(--text-inverse); background: var(--primary-800); }
.hbtn.primary { background: var(--primary-500); color: var(--text-inverse); border-color: var(--primary-500); }
.hbtn.primary:hover { background: var(--primary-600); }
.hbtn.active { color: var(--text-inverse); background: var(--primary-800); }

/* ---- DRAG OVERLAY ---- */
#dragOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: color-mix(in oklch, var(--primary-500) 15%, transparent);
  border: 3px dashed var(--primary-500);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: var(--space-3);
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--primary-500);
}
#dragOverlay.active { display: flex; }

/* ---- APP LAYOUT ---- */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* ---- MAIN AREA ---- */
#mainArea {
  flex: 1;
  margin-left: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- FACH-KACHELN (Default-Ansicht) ---- */
.fach-tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--space-3);
  margin-top: var(--space-2);
}

.fach-tile {
  background: var(--bg-surface);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-4) var(--space-4);
  cursor: pointer;
  transition: border-color 150ms, box-shadow 150ms, transform 100ms;
  position: relative;
  overflow: hidden;
}

.fach-tile:hover {
  border-color: var(--tile-color, var(--primary-500));
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.fach-tile-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--tile-light, var(--primary-50));
  color: var(--tile-color, var(--primary-500));
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--space-3);
}

.fach-tile-name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
  margin-bottom: var(--space-1);
}

.fach-tile-count {
  font-size: var(--text-2xs);
  color: var(--text-secondary);
  margin-bottom: var(--space-3);
}

.fach-tile-themen {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}

.fach-tile-tag {
  font-size: var(--text-2xs);
  font-weight: 500;
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
  background: var(--tile-light, var(--primary-50));
  color: var(--tile-color, var(--primary-500));
}

.fach-tile-arrow {
  position: absolute;
  top: var(--space-4); right: var(--space-4);
  font-size: var(--text-md);
  color: var(--border-strong);
  transition: color 150ms, transform 150ms;
}

.fach-tile:hover .fach-tile-arrow {
  color: var(--tile-color, var(--primary-500));
  transform: translateX(3px);
}

/* ---- THEMA-CHIPS ---- */
.thema-chips {
  display: flex;
  gap: var(--space-1);
  flex-wrap: wrap;
  padding: var(--space-1) 0 var(--space-3);
}

.thema-chip {
  padding: var(--space-1) var(--space-3);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: var(--text-xs);
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
}

.thema-chip:hover {
  border-color: var(--primary-500);
  color: var(--primary-500);
}

.thema-chip.active {
  background: var(--primary-500);
  border-color: var(--primary-500);
  color: var(--text-inverse);
}

.main-inner {
  padding: var(--space-6) var(--space-6) var(--space-12);
  flex: 1;
}

/* ---- BREADCRUMB ---- */
#breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--space-3);
  flex-wrap: wrap;
}

.bc-item {
  cursor: pointer;
  color: var(--primary-500);
  font-weight: 500;
}
.bc-item:hover { text-decoration: underline; }
.bc-sep { color: var(--border-strong); }
.bc-cur { color: var(--text-secondary); }

/* ---- STATS ROW ---- */
#statsRow {
  display: flex;
  gap: var(--space-1);
  margin-bottom: var(--space-5);
  flex-wrap: wrap;
}

.stat-chip {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
}
.stat-chip strong { color: var(--text-primary); font-weight: 600; }

/* ---- FILTER BAR ---- */
#filterBar { margin-bottom: var(--space-2); }

/* ---- FILE LIST SECTIONS ---- */
.recent-section { margin-bottom: var(--space-6); }

.recent-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}

.recent-title {
  font-size: var(--text-2xs);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wider);
}

.thema-section { margin-bottom: var(--space-5); }

.thema-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}

.thema-badge {
  font-size: var(--text-2xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
}

.thema-count-badge {
  font-size: var(--text-2xs);
  color: var(--text-muted);
}

/* Per-fach thema header colors */
.thema-header.fc-0 .thema-badge { color: var(--fc-0-color); }
.thema-header.fc-1 .thema-badge { color: var(--fc-1-color); }
.thema-header.fc-2 .thema-badge { color: var(--fc-2-color); }
.thema-header.fc-3 .thema-badge { color: var(--fc-3-color); }
.thema-header.fc-4 .thema-badge { color: var(--fc-4-color); }
.thema-header.fc-5 .thema-badge { color: var(--fc-5-color); }
.thema-header.fc-6 .thema-badge { color: var(--fc-6-color); }
.thema-header.fc-7 .thema-badge { color: var(--fc-7-color); }

/* Section header (fach level) */
.section-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
  padding-top: var(--space-1);
}

.section-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.section-header.fc-0 .section-dot { background: var(--fc-0-color); }
.section-header.fc-1 .section-dot { background: var(--fc-1-color); }
.section-header.fc-2 .section-dot { background: var(--fc-2-color); }
.section-header.fc-3 .section-dot { background: var(--fc-3-color); }
.section-header.fc-4 .section-dot { background: var(--fc-4-color); }
.section-header.fc-5 .section-dot { background: var(--fc-5-color); }
.section-header.fc-6 .section-dot { background: var(--fc-6-color); }
.section-header.fc-7 .section-dot { background: var(--fc-7-color); }

.section-title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.section-sub {
  font-size: var(--text-2xs);
  color: var(--text-muted);
}

.section-line {
  flex: 1;
  height: 1px;
  background: var(--border-default);
}

/* ---- FILE GRID & CARDS ---- */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: var(--space-1);
  margin-bottom: var(--space-2);
}

.file-card {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  text-decoration: none;
  color: var(--text-primary);
  cursor: pointer;
  transition: border-color 150ms;
  position: relative;
}

.file-card:hover {
  border-color: var(--primary-500);
}

.file-card.active-preview {
  border-color: var(--primary-500);
  background: var(--primary-50);
}

.file-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Per-fach icon colors */
.file-card.fc-0 .file-icon { background: var(--fc-0-light); color: var(--fc-0-color); }
.file-card.fc-1 .file-icon { background: var(--fc-1-light); color: var(--fc-1-color); }
.file-card.fc-2 .file-icon { background: var(--fc-2-light); color: var(--fc-2-color); }
.file-card.fc-3 .file-icon { background: var(--fc-3-light); color: var(--fc-3-color); }
.file-card.fc-4 .file-icon { background: var(--fc-4-light); color: var(--fc-4-color); }
.file-card.fc-5 .file-icon { background: var(--fc-5-light); color: var(--fc-5-color); }
.file-card.fc-6 .file-icon { background: var(--fc-6-light); color: var(--fc-6-color); }
.file-card.fc-7 .file-icon { background: var(--fc-7-light); color: var(--fc-7-color); }

.file-info { flex: 1; min-width: 0; }

.file-title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.file-meta {
  font-size: var(--text-2xs);
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.card-copy-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms;
  flex-shrink: 0;
}

.file-card:hover .card-copy-btn { display: flex; }
.card-copy-btn:hover { border-color: var(--primary-500); color: var(--primary-500); }

/* Edit mode controls */
.card-edit-actions { display: none; }
body.edit-mode .card-edit-actions {
  display: flex;
  gap: var(--space-1);
  margin-top: var(--space-1);
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center;
  padding: var(--space-16) var(--space-6);
  color: var(--text-secondary);
}

.empty-icon {
  display: flex;
  justify-content: center;
  margin-bottom: var(--space-3);
  color: var(--border-strong);
}

.empty-state h3 {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--space-1);
}

.empty-state p { font-size: var(--text-sm); color: var(--text-secondary); }

/* ---- PREVIEW PANEL ---- */
#previewPanel {
  display: none;
  width: 360px;
  flex-shrink: 0;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-default);
  position: fixed;
  top: 0; right: 0; bottom: 0;
  z-index: 35;
  flex-direction: column;
}

#previewPanel.open { display: flex; }

.app-layout.preview-open #mainArea {
  margin-right: 360px;
}

.drag-handle {
  height: 3px;
  background: var(--border-default);
  border-radius: var(--radius-full);
  width: 40px;
  margin: var(--space-2) auto 0;
  cursor: ns-resize;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border-default);
}

.preview-title {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.preview-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 0 0 var(--space-2);
  flex-shrink: 0;
  transition: color 150ms;
}
.preview-close:hover { color: var(--text-primary); }

.preview-meta {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--border-default);
  flex-wrap: wrap;
}

.preview-fach-badge {
  font-size: var(--text-2xs);
  font-weight: 600;
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
}

.preview-thema-txt, .preview-date-txt {
  font-size: var(--text-2xs);
  color: var(--text-secondary);
}

.preview-iframe-wrap {
  flex: 1;
  overflow: hidden;
}

#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
}

.preview-footer {
  display: flex;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-3);
  border-top: 1px solid var(--border-default);
  flex-wrap: wrap;
}

.pv-btn {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: var(--text-2xs);
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
  white-space: nowrap;
}

.pv-btn:hover { border-color: var(--primary-500); color: var(--primary-500); }
.pv-btn.danger:hover { border-color: var(--color-error); color: var(--color-error); }

/* ---- MODALS ---- */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: color-mix(in oklch, var(--text-primary) 40%, transparent);
  z-index: 60;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
}

.modal-backdrop.open { display: flex; }

.modal {
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-xl);
}

.modal h2 {
  font-size: var(--text-md);
  font-weight: 700;
  margin-bottom: var(--space-4);
  color: var(--text-primary);
}

.modal label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--space-1);
  margin-top: var(--space-3);
}

.modal input[type="text"],
.modal input[type="password"] {
  width: 100%;
  padding: var(--space-1) var(--space-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-family: inherit;
  color: var(--text-primary);
  outline: none;
  transition: border-color 150ms;
}

.modal input:focus { border-color: var(--border-focus); }

.modal-footer {
  display: flex;
  gap: var(--space-2);
  justify-content: flex-end;
  margin-top: var(--space-5);
  padding-top: var(--space-4);
  border-top: 1px solid var(--border-default);
}

/* Drop zone */
#dropZone {
  border: 2px dashed var(--border-default);
  border-radius: var(--radius-md);
  padding: var(--space-6);
  text-align: center;
  cursor: pointer;
  margin-bottom: var(--space-3);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  transition: border-color 150ms;
}
#dropZone:hover { border-color: var(--primary-500); }
#dropZone.hover { border-color: var(--primary-500); background: var(--primary-50); }
#dropZone input[type="file"] { display: none; }

/* Progress bar — using design system classes in HTML, but keep IDs for JS */
#progressWrap {
  display: none;
  margin-top: var(--space-3);
}
#progressBar {
  transition: width 300ms ease;
}

/* Token info */
.token-info {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  margin-bottom: var(--space-1);
  line-height: var(--leading-normal);
}

/* Toast */
.toast {
  position: fixed;
  bottom: var(--space-5);
  right: var(--space-5);
  background: var(--text-primary);
  color: var(--text-inverse);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  z-index: 999;
  animation: slideUp 200ms ease;
}

@keyframes slideUp {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Rename/Delete confirm text */
.confirm-text {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-bottom: var(--space-1);
  line-height: var(--leading-normal);
}

/* Edit mode badge on body */
body.edit-mode #editToggle { background: var(--primary-50); color: var(--primary-400); border-color: var(--primary-200); }

/* ---- RESPONSIVE ---- */
@media (max-width: 900px) {
  .app-layout.preview-open #mainArea { margin-right: 0; }
  #previewPanel { width: 100%; }
}

@media (max-width: 768px) {
  #app-header { display: flex; }
  #mainArea { margin-left: 0; }
  .main-inner { padding: var(--space-4) var(--space-3) var(--space-10); }

/* ═══════════════════════════════════════════
   FACH COLOR MAP
═══════════════════════════════════════════ */
const _fachColorMap = {};

function getFachClass(fach) {
  if (!_fachColorMap[fach]) {
    const n = Object.keys(_fachColorMap).length;
    _fachColorMap[fach] = 'fc-' + (n % 8);
  }
  return _fachColorMap[fach];
}

// Stable color seeding in data order
(function () {
  const seen = [];
  materialien.forEach(m => { if (!seen.includes(m.fach)) seen.push(m.fach); });
  seen.forEach(f => getFachClass(f));
})();

const COLOR_VALUES = {
  'fc-0': { color: 'var(--fc-0-color)', light: 'var(--fc-0-light)', bg: 'var(--fc-0-bg)' },
  'fc-1': { color: 'var(--fc-1-color)', light: 'var(--fc-1-light)', bg: 'var(--fc-1-bg)' },
  'fc-2': { color: 'var(--fc-2-color)', light: 'var(--fc-2-light)', bg: 'var(--fc-2-bg)' },
  'fc-3': { color: 'var(--fc-3-color)', light: 'var(--fc-3-light)', bg: 'var(--fc-3-bg)' },
  'fc-4': { color: 'var(--fc-4-color)', light: 'var(--fc-4-light)', bg: 'var(--fc-4-bg)' },
  'fc-5': { color: 'var(--fc-5-color)', light: 'var(--fc-5-light)', bg: 'var(--fc-5-bg)' },
  'fc-6': { color: 'var(--fc-6-color)', light: 'var(--fc-6-light)', bg: 'var(--fc-6-bg)' },
  'fc-7': { color: 'var(--fc-7-color)', light: 'var(--fc-7-light)', bg: 'var(--fc-7-bg)' },
};

function cv(cls) { return COLOR_VALUES[cls] || COLOR_VALUES['fc-0']; }

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ═══════════════════════════════════════════
   SUPABASE – MATERIALIEN LADEN
═══════════════════════════════════════════ */
async function loadMaterialienFromDB() {
  if (!window.__sb) return;
  try {
    const { data, error } = await window.__sb
      .from('materialien')
      .select('id, name, fach, thema, pfad, datum, autor, created_by')
      .eq('is_public', true)
      .order('fach').order('thema').order('name');
    if (error) throw error;
    materialien.length = 0;
    data.forEach(function (m) {
      materialien.push({ id: m.id, name: m.name, fach: m.fach, thema: m.thema,
        pfad: m.pfad, datum: m.datum || '', autor: m.autor || '', created_by: m.created_by });
    });
    buildSidebar();
    render(document.getElementById('search') ? document.getElementById('search').value : '');
    updateBreadcrumb();
  } catch (e) {
    console.warn('[Materialien] Supabase-Fehler, nutze lokalen Cache:', e.message);
  }
}

function buildSidebar() {
  // Sidebar entfernt — Fach-Kacheln übernehmen die Navigation
  // Datalists für Upload-Modal befüllen
  const fachDL = document.getElementById('fachList');
  const themaDL = document.getElementById('themaList');
  if (fachDL) {
    fachDL.innerHTML = '';
    [...new Set(materialien.map(m => m.fach))].forEach(f => {
      const o = document.createElement('option'); o.value = f; fachDL.appendChild(o);
    });
  }
  if (themaDL) {
    themaDL.innerHTML = '';
    [...new Set(materialien.map(m => m.thema))].forEach(t => {
      const o = document.createElement('option'); o.value = t; themaDL.appendChild(o);
    });
  }
}

function selectFolder(fach, thema) {
  selectedFach = fach;
  selectedThema = thema;
  buildSidebar(); // populates datalists only
  render(document.getElementById('search').value);
  updateBreadcrumb();
  closePreview();
}

function updateBreadcrumb() {
  const bc  = document.getElementById('breadcrumb');
  const bcD = document.getElementById('breadcrumb-desktop');
  let html = '';
  if (selectedFach) {
    html = '<span class="bc-item" onclick="selectFolder(null,null)">← Alle Fächer</span>';
    html += '<span class="bc-sep">›</span>';
    if (selectedThema) {
      html += '<span class="bc-item" onclick="selectFolder(\'' + esc(selectedFach) + '\',null)">' + esc(selectedFach) + '</span>';
      html += '<span class="bc-sep">›</span>';
      html += '<span class="bc-cur">' + esc(selectedThema) + '</span>';
    } else {
      html += '<span class="bc-cur">' + esc(selectedFach) + '</span>';
    }
  }
  bc.innerHTML = html;
  if (bcD) bcD.innerHTML = html;
}

function showPreview(m) {
  previewMaterial = m;
  const cls = getFachClass(m.fach);
  const c   = cv(cls);

  document.getElementById('previewTitle').textContent = m.name;

  document.getElementById('previewMeta').innerHTML =
    '<span class="badge preview-fach-badge" style="background:' + c.light + ';color:' + c.color + '">' + esc(m.fach) + '</span>' +
    '<span class="preview-thema-txt">' + esc(m.thema) + '</span>' +
    '<span class="preview-date-txt">' + esc(m.datum) + '</span>';

  document.getElementById('previewFrame').src = m.pfad;

  document.querySelectorAll('.file-card').forEach(function (card) {
    card.classList.toggle('active-preview', card.dataset.pfad === m.pfad);
  });

  document.getElementById('previewPanel').classList.add('open');
  document.querySelector('.app-layout').classList.add('preview-open');
}

function closePreview() {
  previewMaterial = null;

  document.getElementById('previewPanel').classList.remove('open');
  document.querySelector('.app-layout').classList.remove('preview-open');
  document.querySelectorAll('.file-card').forEach(function (c) {
    c.classList.remove('active-preview');

}

/* ═══════════════════════════════════════════
   RENDER

function syncSearch(val) {
  const mobile = document.getElementById('search');
  const desktop = document.getElementById('search-desktop');
  if (mobile && mobile.value !== val) mobile.value = val;
  if (desktop && desktop.value !== val) desktop.value = val;
  render(val);
}

function render(query) {
  if (query === undefined) query = '';
  const q = query.toLowerCase().trim();

  const list      = document.getElementById('fileList');
  const statsRow  = document.getElementById('statsRow');
  const filterBar = document.getElementById('filterBar');

  list.innerHTML = '';

  /* ── DEFAULT: Fach-Kacheln ──────────────────────────────── */
  if (!selectedFach && !selectedThema && !q) {
    statsRow.innerHTML  = '';
    filterBar.innerHTML = '';

    const fachMap = {};
    materialien.forEach(function (m) {
      if (!fachMap[m.fach]) fachMap[m.fach] = { themen: [], count: 0 };
      if (!fachMap[m.fach].themen.includes(m.thema)) fachMap[m.fach].themen.push(m.thema);
      fachMap[m.fach].count++;
    });

    const tileGrid = document.createElement('div');
    tileGrid.className = 'fach-tile-grid';

    Object.entries(fachMap).forEach(function ([fach, data]) {
      const cls = getFachClass(fach);
      const c   = cv(cls);
      const tile = document.createElement('div');
      tile.className = 'fach-tile ' + cls;
      tile.style.cssText = '--tile-color:' + c.color + ';--tile-light:' + c.light + ';--tile-bg:' + c.bg;
      tile.onclick = function () { selectFolder(fach, null); };
      tile.innerHTML =
        '<div class="fach-tile-icon">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
        '</div>' +
        '<div class="fach-tile-name">' + esc(fach) + '</div>' +
        '<div class="fach-tile-count">' + data.count + ' Material' + (data.count !== 1 ? 'ien' : '') + '</div>' +
        '<div class="fach-tile-themen">' +
        data.themen.map(function (t) { return '<span class="badge fach-tile-tag">' + esc(t) + '</span>'; }).join('') +
        '</div>' +
        '<div class="fach-tile-arrow">→</div>';
      tileGrid.appendChild(tile);
    });

    list.appendChild(tileGrid);
    return;
  }

  /* ── FILTER: items ─────────────────────────────────────── */
  let items = materialien.filter(function (m) {
    const matchSearch = !q ||
      m.name.toLowerCase().includes(q) ||
      m.fach.toLowerCase().includes(q) ||
      m.thema.toLowerCase().includes(q);
    const matchFach  = !selectedFach  || m.fach  === selectedFach;
    const matchThema = !selectedThema || m.thema === selectedThema;
    return matchSearch && matchFach && matchThema;
  });

  if (mineFilterActive && window.__kuerzel) {
    items = items.filter(function (m) { return m.autor === window.__kuerzel; });
  }

  /* ── STATS ─────────────────────────────────────────────── */
  const uFaecher = [...new Set(items.map(function (m) { return m.fach; }))].length;
  const uThemen  = [...new Set(items.map(function (m) { return m.thema; }))].length;
  statsRow.innerHTML =
    '<div class="badge stat-chip"><strong>' + items.length + '</strong>&nbsp;Materialien</div>' +
    '<div class="badge stat-chip"><strong>' + uFaecher + '</strong>&nbsp;Fächer</div>' +
    '<div class="badge stat-chip"><strong>' + uThemen  + '</strong>&nbsp;Themen</div>';

  /* ── THEMA-CHIPS (wenn Fach aktiv, keine Suche) ─────────── */
  if (selectedFach && !q) {
    const fachThemen = [...new Set(materialien
      .filter(function (m) { return m.fach === selectedFach; })
      .map(function (m) { return m.thema; }))];
    let chips = '<div class="thema-chips">';
    chips += '<button class="thema-chip' + (!selectedThema ? ' active' : '') +
             '" onclick="selectFolder(\'' + esc(selectedFach) + '\',null)">Alle</button>';
    fachThemen.forEach(function (t) {
      chips += '<button class="thema-chip' + (selectedThema === t ? ' active' : '') +
               '" onclick="selectFolder(\'' + esc(selectedFach) + '\',\'' + esc(t) + '\')">' + esc(t) + '</button>';
    });
    chips += '</div>';
    filterBar.innerHTML = chips;
  } else {
    filterBar.innerHTML = '';
  }

  /* ── EMPTY STATE ───────────────────────────────────────── */
  if (items.length === 0) {
    list.innerHTML =
      '<div class="empty-state">' +
      '<div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>' +
      '<h3>Keine Materialien gefunden</h3>' +
      '<p>Anderen Suchbegriff versuchen.</p>' +
      '</div>';
    return;
  }

  /* ── KARTEN-ANSICHT ────────────────────────────────────── */
  if (selectedThema || q) {
    // Flache Liste (Thema gewählt oder Suche)
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    items.forEach(function (m) { grid.appendChild(makeCard(m)); });
    list.appendChild(grid);

  } else if (selectedFach) {
    // Nach Thema gruppiert
    const themaMap = {};
    items.forEach(function (m) {
      if (!themaMap[m.thema]) themaMap[m.thema] = [];
      themaMap[m.thema].push(m);
    });
    const cls = getFachClass(selectedFach);
    Object.entries(themaMap).forEach(function ([thema, ms]) {
      const sec = document.createElement('div');
      sec.className = 'thema-section';
      sec.innerHTML =
        '<div class="thema-header ' + cls + '">' +
        '<span class="badge thema-badge">' + esc(thema) + '</span>' +
        '<span class="thema-count-badge">' + ms.length + ' Material' + (ms.length !== 1 ? 'ien' : '') + '</span>' +
        '</div>';
      const grid = document.createElement('div');
      grid.className = 'file-grid';
      ms.forEach(function (m) { grid.appendChild(makeCard(m)); });
      sec.appendChild(grid);
      list.appendChild(sec);
    });
  }
}

function makeCard(m) {
  const cls = getFachClass(m.fach);

  const card = document.createElement('a');
  card.className = 'file-card ' + cls;
  card.href = m.pfad;
  card.dataset.pfad = m.pfad;

  card.innerHTML =
    '<div class="file-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>' +
    '<div class="file-info">' +
    '  <div class="file-title">' + esc(m.name) + '</div>' +
    '  <div class="file-meta">' + esc(m.fach) + ' · ' + esc(m.thema) + ' · ' + esc(m.datum) +
       (m.autor ? ' · <span class="badge badge-brand">' + esc(m.autor) + '</span>' : '') +
    '</div>' +
    '</div>' +
    '<button class="card-copy-btn" title="Link kopieren" onclick="copyLink(event,\'' + esc(m.pfad) + '\')">' +
    '  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
    '    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>' +
    '    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>' +
    '  </svg>' +
    '</button>';

  // Edit-mode inline actions
  if (editMode) {
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:var(--space-1);flex-shrink:0;margin-left:var(--space-1);';
    const pfadSafe = m.pfad.replace(/'/g, "\\'");
    actions.innerHTML =
      '<button style="padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);font-size:var(--text-2xs);cursor:pointer;color:var(--text-primary);" ' +
      'onclick="event.preventDefault();event.stopPropagation();showRename(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Bearb.</button>' +
      '<button style="padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);border:1.5px solid var(--color-error-bg);background:var(--bg-surface);font-size:var(--text-2xs);cursor:pointer;color:var(--color-error);" ' +
      'onclick="event.preventDefault();event.stopPropagation();showDelete(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Löschen</button>';
    card.appendChild(actions);
  }

  card.addEventListener('click', function (e) {
    e.preventDefault();
    showPreview(m);
  });

  if (previewMaterial && previewMaterial.pfad === m.pfad) {
    card.classList.add('active-preview');
  }

  return card;
}

function copyLink(e, pfad) {
  e.preventDefault();
  e.stopPropagation();
  navigator.clipboard.writeText(encodeURI(BASE_URL + pfad))
    .then(function () { showToast('Link kopiert!'); });
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-backdrop').forEach(function (bd) {

/* ═══════════════════════════════════════════
   TOKEN
═══════════════════════════════════════════ */
function showToken() {
  document.getElementById('inputToken').value = getToken();
  openModal('modalToken');
}
function saveToken() {
  const t = document.getElementById('inputToken').value.trim();
  if (t) { localStorage.setItem('gh_token', t); showToast('Token gespeichert'); }
  closeModal('modalToken');
}
function getToken() { return localStorage.getItem('gh_token') || ''; }

/* ═══════════════════════════════════════════
   GITHUB API
═══════════════════════════════════════════ */
function ghHeaders() {
  return {
    Authorization: 'token ' + getToken(),
    Accept: 'application/vnd.github.v3+json'
  };
}

function ghError(status, message) {
  if (status === 401) return new Error('GitHub Token ungültig oder abgelaufen – bitte neu setzen (⚙️ Token-Button)');
  if (status === 403) return new Error('GitHub Token hat keine Schreibrechte – bitte Token mit repo-Berechtigung erstellen');
  if (status === 422) return new Error('Datei existiert bereits oder ungültige Daten (422)');
  return new Error(message || 'GitHub Fehler ' + status);
}

// Encode each path segment individually (spaces → %20, umlauts → %C3%xx etc.)
// Required because fetch() does not auto-encode non-ASCII characters in URLs.
function ghPath(p) {
  return p.split('/').map(encodeURIComponent).join('/');
}

async function ghGet(path) {
  const r = await fetch(API + '/contents/' + ghPath(path), { headers: ghHeaders() });
  if (!r.ok) throw ghError(r.status, 'GET ' + path + ': ' + r.status);
  return r.json();
}

async function ghPut(path, body) {
  const r = await fetch(API + '/contents/' + ghPath(path), {
    method: 'PUT',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(function () { return {}; });
    throw ghError(r.status, err.message);
  }
  return r.json();
}

async function ghDelete(path, sha, message) {
  const r = await fetch(API + '/contents/' + ghPath(path), {
    method: 'DELETE',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message, sha: sha })
  });
  if (!r.ok) throw ghError(r.status, 'DELETE ' + path + ': ' + r.status);
}

/* ═══════════════════════════════════════════
   UPLOAD
═══════════════════════════════════════════ */
function showUpload() {
  uploadFile = null;
  document.getElementById('uploadTitel').value = '';
  document.getElementById('uploadFach').value  = '';
  document.getElementById('uploadThema').value = '';
  document.getElementById('uploadAutor').value = (window.__kuerzel || '');
  document.getElementById('dzText').textContent = 'HTML-Datei hierher ziehen oder klicken';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width    = '0%';
  document.getElementById('uploadErrorBox').style.display = 'none';
  document.getElementById('uploadErrorBox').textContent   = '';
  document.getElementById('btnUpload').disabled         = false;
  document.getElementById('btnUpload').textContent      = 'Hochladen';
  openModal('modalUpload');
}

function fileChosen(e) {
  const f = e.target.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById('dzText').textContent = '✓ ' + f.name;
  if (!document.getElementById('uploadTitel').value)
    document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
}

function dzDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}
function dzDragLeave() {
  document.getElementById('dropZone').classList.remove('drag-over');
}
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    if (!document.getElementById('uploadTitel').value)
      document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
}

async function doUpload() {
  if (!uploadFile)   return showToast('Keine Datei ausgewählt');
  const titel = document.getElementById('uploadTitel').value.trim();
  const fach  = document.getElementById('uploadFach').value.trim();
  const thema = document.getElementById('uploadThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = 'Hochladen…';

  const autor = (document.getElementById('uploadAutor').value.trim() || window.__kuerzel || '').toUpperCase().slice(0,4);
  const pfad = 'materialien/' + fach + '/' + thema + '/' + uploadFile.name;
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  pw.style.display = 'block';
  pb.style.width = '25%';

  const errBox = document.getElementById('uploadErrorBox');
  errBox.style.display = 'none';
  errBox.textContent   = '';

  try {
    const content = await new Promise(function (res, rej) {
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const bytes = new TextEncoder().encode(e.target.result);
          let binary = '';
          for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
          res(btoa(binary));
        } catch(err) { rej(err); }
      };
      reader.onerror = rej;
      reader.readAsText(uploadFile, 'UTF-8');
    });
    pb.style.width = '55%';

    // Try upload; if 422 (file exists) fetch existing SHA and overwrite
    try {
      await ghPut(pfad, { message: 'Upload: ' + titel, content: content });
    } catch (putErr) {
      if (putErr.message && putErr.message.includes('422')) {
        // File already exists — fetch its SHA and update
        const existing = await ghGet(pfad);
        await ghPut(pfad, { message: 'Update: ' + titel, content: content, sha: existing.sha });
      } else {
        throw putErr;
      }
    }
    pb.style.width = '75%';

    const today = new Date();
    const datum = today.getDate() + '.' + (today.getMonth() + 1) + '.' + today.getFullYear();
    // Update existing entry or push new one
    const existingIdx = materialien.findIndex(function (m) { return m.pfad === pfad; });
    if (existingIdx >= 0) {
      materialien[existingIdx] = { name: titel, fach: fach, thema: thema, pfad: pfad, datum: datum, autor: autor };
    } else {
      materialien.push({ name: titel, fach: fach, thema: thema, pfad: pfad, datum: datum, autor: autor });
    }
    // Supabase UPSERT – bei erneutem Upload (gleicher Pfad) wird der Eintrag aktualisiert.
    // created_by wird beim ersten INSERT per Trigger gesetzt und bei Updates nicht überschrieben.
    if (!window.__sb || !window.__session) throw new Error('Nicht eingeloggt – bitte Seite neu laden');
    const { error: sbErr } = await window.__sb.from('materialien').upsert(
      { name: titel, fach: fach, thema: thema, pfad: pfad, datum: datum, autor: autor },
      { onConflict: 'pfad' }
    );
    if (sbErr) throw new Error('Supabase: ' + sbErr.message);
    pb.style.width = '100%';

    setTimeout(function () {
      closeModal('modalUpload');
      buildSidebar();
      render(document.getElementById('search').value);
      showToast('"' + titel + '" hochgeladen');
      btn.disabled    = false;
      btn.textContent = 'Hochladen';
      pw.style.display = 'none';
      pb.style.width   = '0%';
    }, 400);
  } catch (e) {
    console.error('[Upload Fehler]', e);
    const msg = e.message || 'Unbekannter Fehler';
    errBox.textContent   = '⚠ ' + msg;
    errBox.style.display = 'block';
    showToast('Fehler: ' + msg, 5000);
    btn.disabled    = false;
    btn.textContent = 'Hochladen';
    pb.style.width  = '0%';
  }
}

/* ═══════════════════════════════════════════
   RENAME
═══════════════════════════════════════════ */
function showRename(m) {
  if (!m) return;
  renameTarget = m;
  document.getElementById('inputTitel').value = m.name;
  document.getElementById('inputFach').value  = m.fach;
  document.getElementById('inputThema').value = m.thema;
  // Datalist mit allen vorhandenen Themen (für das gewählte Fach zuerst)
  const dl = document.getElementById('inputThemaList');
  const themen = [...new Set(
    materialien
      .sort((a, b) => (a.fach === m.fach ? -1 : 1))
      .map(x => x.thema)
  )];
  dl.innerHTML = themen.map(t => `<option value="${t}">`).join('');
  openModal('modalRename');
}

async function doRename() {
  if (!renameTarget) return;
  const titel = document.getElementById('inputTitel').value.trim();
  const fach  = document.getElementById('inputFach').value.trim();
  const thema = document.getElementById('inputThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');

  const btn = document.getElementById('btnSaveRename');
  btn.disabled = true;
  btn.textContent = 'Speichern…';

  const idx = materialien.indexOf(renameTarget);
  if (idx < 0) { btn.disabled = false; btn.textContent = 'Speichern'; return; }

  // Nur Metadaten im Index aktualisieren – Datei bleibt am alten Pfad.
  // Das verhindert unnötige Datei-Verschiebungen auf GitHub und macht
  // das Umbenennen von Fach/Thema deutlich robuster.
  const updated = {
    name:  titel,
    fach:  fach,
    thema: thema,
    pfad:  renameTarget.pfad,   // Pfad unverändert lassen
    datum: renameTarget.datum,
    autor: renameTarget.autor
  };
  materialien[idx] = updated;

  try {
    // Supabase UPDATE – kein GitHub-Token nötig, wir ändern nur Metadaten
    if (!window.__sb || !window.__session) throw new Error('Nicht eingeloggt');
    const { error: sbErr } = await window.__sb.from('materialien')
      .update({ name: titel, fach: fach, thema: thema })
      .eq('pfad', renameTarget.pfad);
    if (sbErr) throw new Error('Supabase: ' + sbErr.message);
    closeModal('modalRename');
    buildSidebar();
    render(document.getElementById('search').value);
    if (previewMaterial && previewMaterial.pfad === renameTarget.pfad) showPreview(updated);
    renameTarget = null;
    showToast('Gespeichert ✓');
  } catch (e) {
    materialien[idx] = renameTarget; // Rollback
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Speichern';
  }
}

/* ═══════════════════════════════════════════
   DELETE
═══════════════════════════════════════════ */
function showDelete(m) {
  if (!m) return;
  deleteTarget = m;
  document.getElementById('deleteDesc').textContent =
    'Möchtest du "' + m.name + '" (' + m.fach + ' / ' + m.thema + ') wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.';
  document.getElementById('deleteErrorBox').style.display = 'none';
  document.getElementById('deleteErrorBox').textContent   = '';
  openModal('modalDelete');
}

function _showDeleteError(msg) {
  console.error('[Delete Fehler]', msg);
  const box = document.getElementById('deleteErrorBox');
  box.textContent   = '⚠ ' + msg;
  box.style.display = 'block';
  showToast('Fehler: ' + msg, 5000);
}

async function doDelete() {
  if (!deleteTarget) return;
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnConfirmDelete');
  btn.disabled    = true;
  btn.textContent = 'Löschen…';
  document.getElementById('deleteErrorBox').style.display = 'none';

  const target = deleteTarget; // capture before any async gap
  try {
    // Step 1: get SHA (needed for file deletion later)
    let fileInfo;
    try {
      fileInfo = await ghGet(target.pfad);
    } catch (e) {
      // File not found on GitHub – offer to clean up the index entry only
      if (e.message && e.message.includes('404')) {
        const removeOnly = confirm(
          '"' + target.name + '" wurde auf GitHub nicht gefunden (möglicherweise bereits gelöscht).\n\n' +
          'Soll der Eintrag trotzdem aus der Liste entfernt werden?'
        );
        if (removeOnly) {
          const idx = materialien.indexOf(target);
          if (idx >= 0) materialien.splice(idx, 1);
          if (!window.__sb || !window.__session) throw new Error('Nicht eingeloggt');
          const { error: sbErr } = await window.__sb.from('materialien').delete().eq('pfad', target.pfad);
          if (sbErr) throw new Error('Supabase: ' + sbErr.message);
          if (previewMaterial && previewMaterial.pfad === target.pfad) closePreview();
          closeModal('modalDelete');
          buildSidebar();
          render(document.getElementById('search').value);
          showToast('"' + target.name + '" aus Liste entfernt');
          deleteTarget = null;
        }
        return;
      }
      throw e;
    }

    // Step 2: remove from local array and update Supabase FIRST
    // → if Supabase update fails the file still exists and state stays consistent
    const idx = materialien.indexOf(target);
    if (idx >= 0) materialien.splice(idx, 1);
    try {
      if (!window.__sb || !window.__session) throw new Error('Nicht eingeloggt');
      const { error: sbErr } = await window.__sb.from('materialien').delete().eq('pfad', target.pfad);
      if (sbErr) { if (idx >= 0) materialien.splice(idx, 0, target); throw new Error('Supabase: ' + sbErr.message); }
    } catch (e) {
      // Roll back the local array so the UI stays in sync
      if (idx >= 0) materialien.splice(idx, 0, target);
      throw e;
    }

    // Step 3: delete the actual file (index already updated)
    await ghDelete(target.pfad, fileInfo.sha, 'Delete: ' + target.name);

    if (previewMaterial && previewMaterial.pfad === target.pfad) closePreview();

    closeModal('modalDelete');
    buildSidebar();
    render(document.getElementById('search').value);
    showToast('"' + target.name + '" gelöscht');
    deleteTarget = null;
  } catch (e) {
    _showDeleteError(e.message || 'Unbekannter Fehler');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Löschen';
  }
}

/* ═══════════════════════════════════════════
   GLOBAL DRAG & DROP
═══════════════════════════════════════════ */
let _dragCounter = 0;

document.addEventListener('dragenter', function (e) {
  if (e.dataTransfer && e.dataTransfer.types && e.dataTransfer.types.includes('Files')) {
    _dragCounter++;
    document.getElementById('dragOverlay').classList.add('active');
  }
});
document.addEventListener('dragleave', function () {
  _dragCounter--;
  if (_dragCounter <= 0) {
    _dragCounter = 0;
    document.getElementById('dragOverlay').classList.remove('active');
  }
});
document.addEventListener('dragover', function (e) { e.preventDefault(); });
document.addEventListener('drop', function (e) {
  e.preventDefault();
  _dragCounter = 0;
  document.getElementById('dragOverlay').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    showUpload();
    // Re-apply file info after modal opens
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    document.getElementById('uploadTitel').value  = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
});

   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(function (m) {
      m.classList.remove('open');
    });
    closePreview();
    closeSidebar();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});
