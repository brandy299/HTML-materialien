<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterricht.Digital – Materialien</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Brand */
  --primary:        #1D4ED8;
  --primary-hover:  #1E40AF;
  --primary-pale:   #EFF6FF;
  --accent:         #D97706;
  --accent-pale:    #FFFBEB;

  /* Text */
  --text:           #0F172A;
  --text-muted:     #475569;
  --text-light:     #94A3B8;

  /* Surface */
  --bg:             #F8FAFC;
  --white:          #FFFFFF;
  --border:         #E2E8F0;
  --border-strong:  #CBD5E1;

  /* Sidebar */
  --sidebar-bg:     #0F172A;
  --sidebar-w:      224px;

  /* State */
  --success:        #059669;
  --error:          #DC2626;

  /* Shape */
  --radius:         7px;
  --radius-lg:      12px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.08);
  --shadow:    0 4px 16px rgba(15,23,42,0.10);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ---- MOBILE HEADER ---- */
#app-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--sidebar-bg);
  padding: 10px 14px;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.logo-icon {
  width: 28px; height: 28px;
  background: var(--primary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-text {
  font-size: 13px;
  font-weight: 700;
  color: #F9FAFB;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-spacer { flex: 1; }

#searchWrap {
  position: relative;
  flex: 1;
  min-width: 120px;
  max-width: 240px;
}

#searchWrap svg {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 6px 10px 6px 28px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  color: #F9FAFB;
  outline: none;
  transition: border-color 150ms;
}

#search::placeholder { color: rgba(255,255,255,0.3); }
#search:focus { border-color: rgba(79,70,229,0.6); }

.hbtn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  border-radius: var(--radius);
  color: #9CA3AF;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 150ms;
}

.hbtn:hover { color: #F9FAFB; background: rgba(255,255,255,0.1); }
.hbtn.primary { background: var(--primary); color: white; border-color: var(--primary); }
.hbtn.primary:hover { background: var(--primary-hover); }
.hbtn.active { color: #F9FAFB; background: rgba(255,255,255,0.1); }

/* ---- DRAG OVERLAY ---- */
#dragOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(79,70,229,0.15);
  border: 3px dashed var(--primary);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  font-size: 15px;
  font-weight: 600;
  color: var(--primary);
}
#dragOverlay.active { display: flex; }

/* ---- APP LAYOUT ---- */
.app-layout {
  display: flex;
  min-height: calc(100vh - 0px);
}

/* ---- MAIN AREA ---- */
#mainArea {
  flex: 1;
  margin-left: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- FACH-KACHELN (Default-Ansicht) ---- */
.fach-tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-top: 8px;
}

.fach-tile {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 22px 20px 18px;
  cursor: pointer;
  transition: border-color 150ms, box-shadow 150ms, transform 100ms;
  position: relative;
  overflow: hidden;
}

.fach-tile:hover {
  border-color: var(--tile-color, var(--primary));
  box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  transform: translateY(-1px);
}

.fach-tile-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--tile-light, #EEF2FF);
  color: var(--tile-color, #4F46E5);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}

.fach-tile-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}

.fach-tile-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.fach-tile-themen {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.fach-tile-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
  background: var(--tile-light, #EEF2FF);
  color: var(--tile-color, #4F46E5);
}

.fach-tile-arrow {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 16px;
  color: var(--border-strong);
  transition: color 150ms, transform 150ms;
}

.fach-tile:hover .fach-tile-arrow {
  color: var(--tile-color, var(--primary));
  transform: translateX(3px);
}

/* ---- THEMA-CHIPS ---- */
.thema-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 4px 0 14px;
}

.thema-chip {
  padding: 5px 14px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--white);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
}

.thema-chip:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.thema-chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.main-inner {
  padding: 24px 28px 48px;
  flex: 1;
}

/* ---- BREADCRUMB ---- */
#breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.bc-item {
  cursor: pointer;
  color: var(--primary);
  font-weight: 500;
}
.bc-item:hover { text-decoration: underline; }
.bc-sep { color: var(--border-strong); }
.bc-cur { color: var(--text-muted); }

/* ---- STATS ROW ---- */
#statsRow {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.stat-chip {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--white);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 100px;
}
.stat-chip strong { color: var(--text); font-weight: 600; }

/* ---- FILTER BAR ---- */
#filterBar { margin-bottom: 8px; }

/* ---- FILE LIST SECTIONS ---- */
.recent-section { margin-bottom: 24px; }

.recent-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.recent-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.thema-section { margin-bottom: 20px; }

.thema-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.thema-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.thema-count-badge {
  font-size: 11px;
  color: var(--text-light);
}

/* Per-fach thema header colors */
.thema-header.fc-0 .thema-badge { color: #4F46E5; }
.thema-header.fc-1 .thema-badge { color: #0891B2; }
.thema-header.fc-2 .thema-badge { color: #EA580C; }
.thema-header.fc-3 .thema-badge { color: #9333EA; }
.thema-header.fc-4 .thema-badge { color: #1D4ED8; }
.thema-header.fc-5 .thema-badge { color: #DB2777; }
.thema-header.fc-6 .thema-badge { color: #16A34A; }
.thema-header.fc-7 .thema-badge { color: #D97706; }

/* Section header (fach level) */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding-top: 4px;
}

.section-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.section-header.fc-0 .section-dot { background: #4F46E5; }
.section-header.fc-1 .section-dot { background: #0891B2; }
.section-header.fc-2 .section-dot { background: #EA580C; }
.section-header.fc-3 .section-dot { background: #9333EA; }
.section-header.fc-4 .section-dot { background: #1D4ED8; }
.section-header.fc-5 .section-dot { background: #DB2777; }
.section-header.fc-6 .section-dot { background: #16A34A; }
.section-header.fc-7 .section-dot { background: #D97706; }

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.section-sub {
  font-size: 11px;
  color: var(--text-light);
}

.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ---- FILE GRID & CARDS ---- */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}

.file-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-decoration: none;
  color: var(--text);
  cursor: pointer;
  transition: border-color 150ms;
  position: relative;
}

.file-card:hover {
  border-color: var(--primary);
}

.file-card.active-preview {
  border-color: var(--primary);
  background: #F5F3FF;
}

.file-icon {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Per-fach icon colors */
.file-card.fc-0 .file-icon { background: #EEF2FF; color: #4F46E5; }
.file-card.fc-1 .file-icon { background: #ECFEFF; color: #0891B2; }
.file-card.fc-2 .file-icon { background: #FFF7ED; color: #EA580C; }
.file-card.fc-3 .file-icon { background: #FAF5FF; color: #9333EA; }
.file-card.fc-4 .file-icon { background: #EFF6FF; color: #1D4ED8; }
.file-card.fc-5 .file-icon { background: #FDF2F8; color: #DB2777; }
.file-card.fc-6 .file-icon { background: #F0FDF4; color: #16A34A; }
.file-card.fc-7 .file-icon { background: #FFFBEB; color: #D97706; }

.file-info { flex: 1; min-width: 0; }

.file-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.file-meta {
  font-size: 11px;
  color: var(--text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.card-copy-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 150ms;
  flex-shrink: 0;
}

.file-card:hover .card-copy-btn { display: flex; }
.card-copy-btn:hover { border-color: var(--primary); color: var(--primary); }

/* Edit mode controls */
.card-edit-actions { display: none; }
body.edit-mode .card-edit-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}

.empty-icon {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
  color: var(--border-strong);
}

.empty-state h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.empty-state p { font-size: 13px; color: var(--text-muted); }

/* ---- PREVIEW PANEL ---- */
#previewPanel {
  display: none;
  width: 360px;
  flex-shrink: 0;
  background: var(--white);
  border-left: 1px solid var(--border);
  position: fixed;
  top: 0; right: 0; bottom: 0;
  z-index: 35;
  flex-direction: column;
}

#previewPanel.open { display: flex; }

.app-layout.preview-open #mainArea {
  margin-right: 360px;
}

.drag-handle {
  height: 3px;
  background: var(--border);
  border-radius: 100px;
  width: 40px;
  margin: 10px auto 0;
  cursor: ns-resize;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.preview-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.preview-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 0 0 8px;
  flex-shrink: 0;
  transition: color 150ms;
}
.preview-close:hover { color: var(--text); }

.preview-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.preview-fach-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
}

.preview-thema-txt, .preview-date-txt {
  font-size: 11px;
  color: var(--text-muted);
}

.preview-iframe-wrap {
  flex: 1;
  overflow: hidden;
}

#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
}

.preview-footer {
  display: flex;
  gap: 4px;
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.pv-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
  white-space: nowrap;
}

.pv-btn:hover { border-color: var(--primary); color: var(--primary); }
.pv-btn.danger:hover { border-color: var(--error); color: var(--error); }

/* ---- MODALS ---- */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 60;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-backdrop.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 10px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}

.modal h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

.modal label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  margin-top: 12px;
}

.modal input[type="text"],
.modal input[type="password"] {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color 150ms;
}

.modal input:focus { border-color: var(--primary); }

.modal-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.btn-primary {
  padding: 7px 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 150ms;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  padding: 7px 16px;
  background: var(--white);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
}
.btn-secondary:hover { border-color: var(--border-strong); color: var(--text); }

.btn-danger {
  padding: 7px 16px;
  background: var(--white);
  color: var(--error);
  border: 1px solid #FECACA;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 150ms;
}
.btn-danger:hover { background: #FEF2F2; }

/* Drop zone */
#dropZone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--text-muted);
  transition: border-color 150ms;
}
#dropZone:hover { border-color: var(--primary); }
#dropZone.hover { border-color: var(--primary); background: #F5F3FF; }
#dropZone input[type="file"] { display: none; }

/* Progress bar */
#progressWrap {
  display: none;
  height: 4px;
  background: var(--border);
  border-radius: 100px;
  margin-top: 12px;
  overflow: hidden;
}
#progressBar {
  height: 100%;
  background: var(--primary);
  border-radius: 100px;
  transition: width 300ms ease;
}

/* Token info */
.token-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
  line-height: 1.5;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--text);
  color: white;
  padding: 8px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  animation: slideUp 200ms ease;
}

@keyframes slideUp {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Rename/Delete confirm text */
.confirm-text {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 4px;
  line-height: 1.5;
}

/* Edit mode badge on body */
body.edit-mode #editToggle { background: rgba(79,70,229,0.15); color: #A5B4FC; border-color: rgba(79,70,229,0.3); }

/* ---- RESPONSIVE ---- */
@media (max-width: 900px) {
  .app-layout.preview-open #mainArea { margin-right: 0; }
  #previewPanel { width: 100%; }
}

@media (max-width: 768px) {
  #app-header { display: flex; }
  #mainArea { margin-left: 0; }
  .main-inner { padding: 16px 14px 40px; }
  .file-grid { grid-template-columns: 1fr; }
  #statsRow { display: none; }
  .fach-tile-grid { grid-template-columns: 1fr; }
  .thema-chips { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px; }
}

/* ---- DESKTOP TOPBAR ---- */
.main-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}

.main-topbar-left {
  flex: 1;
  min-width: 0;
}

.main-topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.search-wrap-desktop {
  position: relative;
}

.search-wrap-desktop svg {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
  pointer-events: none;
}

#search-desktop {
  padding: 6px 10px 6px 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);

<script>
/* ═══════════════════════════════════════════

const OWNER   = 'brandy299';

/* ═══════════════════════════════════════════
   DATA

const materialien = [

  }
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let editMode      = false;
let renameTarget  = null;
let deleteTarget  = null;
let uploadFile    = null;
let activeFilter  = null;

let selectedFach    = null;
let selectedThema   = null;
let previewMaterial = null;

/* ═══════════════════════════════════════════
   FACH COLOR MAP
═══════════════════════════════════════════ */
const _fachColorMap = {};

function getFachClass(fach) {
  if (!_fachColorMap[fach]) {
    const n = Object.keys(_fachColorMap).length;
    _fachColorMap[fach] = 'fc-' + (n % 8);
  }
  return _fachColorMap[fach];
}

// Stable color seeding in data order
(function () {
  const seen = [];
  materialien.forEach(m => { if (!seen.includes(m.fach)) seen.push(m.fach); });
  seen.forEach(f => getFachClass(f));
})();

const COLOR_VALUES = {
  'fc-0': { color: '#4F46E5', light: '#EEF2FF', bg: '#F5F3FF' },
  'fc-1': { color: '#0891B2', light: '#CFFAFE', bg: '#ECFEFF' },
  'fc-2': { color: '#EA580C', light: '#FFEDD5', bg: '#FFF7ED' },
  'fc-3': { color: '#9333EA', light: '#F3E8FF', bg: '#FAF5FF' },
  'fc-4': { color: '#1D4ED8', light: '#DBEAFE', bg: '#EFF6FF' },
  'fc-5': { color: '#DB2777', light: '#FCE7F3', bg: '#FDF2F8' },
  'fc-6': { color: '#6366F1', light: '#E0E7FF', bg: '#EEF2FF' },
  'fc-7': { color: '#D97706', light: '#FEF3C7', bg: '#FFFBEB' },
};

function cv(cls) { return COLOR_VALUES[cls] || COLOR_VALUES['fc-0']; }

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ═══════════════════════════════════════════
   SIDEBAR (no-op — sidebar removed)
═══════════════════════════════════════════ */
function buildSidebar() {
  // Sidebar entfernt — Fach-Kacheln übernehmen die Navigation
  // Datalists für Upload-Modal befüllen
  const fachDL = document.getElementById('fachList');
  const themaDL = document.getElementById('themaList');
  if (fachDL) {
    fachDL.innerHTML = '';
    [...new Set(materialien.map(m => m.fach))].forEach(f => {
      const o = document.createElement('option'); o.value = f; fachDL.appendChild(o);
    });
  }
  if (themaDL) {
    themaDL.innerHTML = '';
    [...new Set(materialien.map(m => m.thema))].forEach(t => {
      const o = document.createElement('option'); o.value = t; themaDL.appendChild(o);
    });
  }
}

function selectFolder(fach, thema) {
  selectedFach = fach;
  selectedThema = thema;
  buildSidebar(); // populates datalists only
  render(document.getElementById('search').value);
  updateBreadcrumb();
  closePreview();
}

function updateBreadcrumb() {
  const bc  = document.getElementById('breadcrumb');
  const bcD = document.getElementById('breadcrumb-desktop');
  let html = '';
  if (selectedFach) {
    html = '<span class="bc-item" onclick="selectFolder(null,null)">← Alle Fächer</span>';
    html += '<span class="bc-sep">›</span>';
    if (selectedThema) {
      html += '<span class="bc-item" onclick="selectFolder(\'' + esc(selectedFach) + '\',null)">' + esc(selectedFach) + '</span>';
      html += '<span class="bc-sep">›</span>';
      html += '<span class="bc-cur">' + esc(selectedThema) + '</span>';
    } else {
      html += '<span class="bc-cur">' + esc(selectedFach) + '</span>';
    }
  }
  bc.innerHTML = html;
  if (bcD) bcD.innerHTML = html;
}

/* ═══════════════════════════════════════════
   PREVIEW PANEL
═══════════════════════════════════════════ */
function showPreview(m) {
  previewMaterial = m;
  const cls = getFachClass(m.fach);
  const c   = cv(cls);

  document.getElementById('previewTitle').textContent = m.name;

  document.getElementById('previewMeta').innerHTML =
    '<span class="preview-fach-badge" style="background:' + c.light + ';color:' + c.color + '">' + esc(m.fach) + '</span>' +
    '<span class="preview-thema-txt">' + esc(m.thema) + '</span>' +
    '<span class="preview-date-txt">' + esc(m.datum) + '</span>';

  document.getElementById('previewFrame').src = m.pfad;

  document.querySelectorAll('.file-card').forEach(function (card) {
    card.classList.toggle('active-preview', card.dataset.pfad === m.pfad);
  });

  document.getElementById('previewPanel').classList.add('open');
  document.querySelector('.app-layout').classList.add('preview-open');
}

function closePreview() {
  previewMaterial = null;
  document.getElementById('previewFrame').src = 'about:blank';
  document.getElementById('previewPanel').classList.remove('open');
  document.querySelector('.app-layout').classList.remove('preview-open');
  document.querySelectorAll('.file-card').forEach(function (c) {
    c.classList.remove('active-preview');
  });
}

function previewOpenNew() {
  if (previewMaterial) window.open(previewMaterial.pfad, '_blank');
}

function previewCopyLink() {
  if (!previewMaterial) return;
  navigator.clipboard.writeText(BASE_URL + previewMaterial.pfad)
    .then(function () { showToast('Link kopiert!'); });
}

function previewEdit() {
  if (previewMaterial) showRename(previewMaterial);
}

function previewDelete() {
  if (previewMaterial) showDelete(previewMaterial);
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function syncSearch(val) {
  const mobile = document.getElementById('search');
  const desktop = document.getElementById('search-desktop');
  if (mobile && mobile.value !== val) mobile.value = val;
  if (desktop && desktop.value !== val) desktop.value = val;
  render(val);
}

function render(query) {
  if (query === undefined) query = '';
  const q = query.toLowerCase().trim();

  const list      = document.getElementById('fileList');
  const statsRow  = document.getElementById('statsRow');
  const filterBar = document.getElementById('filterBar');

  list.innerHTML = '';

  /* ── DEFAULT: Fach-Kacheln ──────────────────────────────── */
  if (!selectedFach && !selectedThema && !q) {
    statsRow.innerHTML  = '';
    filterBar.innerHTML = '';

    const fachMap = {};
    materialien.forEach(function (m) {
      if (!fachMap[m.fach]) fachMap[m.fach] = { themen: [], count: 0 };
      if (!fachMap[m.fach].themen.includes(m.thema)) fachMap[m.fach].themen.push(m.thema);
      fachMap[m.fach].count++;
    });

    const tileGrid = document.createElement('div');
    tileGrid.className = 'fach-tile-grid';

    Object.entries(fachMap).forEach(function ([fach, data]) {
      const cls = getFachClass(fach);
      const c   = cv(cls);
      const tile = document.createElement('div');
      tile.className = 'fach-tile ' + cls;
      tile.style.cssText = '--tile-color:' + c.color + ';--tile-light:' + c.light + ';--tile-bg:' + c.bg;
      tile.onclick = function () { selectFolder(fach, null); };
      tile.innerHTML =
        '<div class="fach-tile-icon">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
        '</div>' +
        '<div class="fach-tile-name">' + esc(fach) + '</div>' +
        '<div class="fach-tile-count">' + data.count + ' Material' + (data.count !== 1 ? 'ien' : '') + '</div>' +
        '<div class="fach-tile-themen">' +
        data.themen.map(function (t) { return '<span class="fach-tile-tag">' + esc(t) + '</span>'; }).join('') +
        '</div>' +
        '<div class="fach-tile-arrow">→</div>';
      tileGrid.appendChild(tile);
    });

    list.appendChild(tileGrid);
    return;
  }

  /* ── FILTER: items ─────────────────────────────────────── */
  const items = materialien.filter(function (m) {
    const matchSearch = !q ||
      m.name.toLowerCase().includes(q) ||
      m.fach.toLowerCase().includes(q) ||
      m.thema.toLowerCase().includes(q);
    const matchFach  = !selectedFach  || m.fach  === selectedFach;
    const matchThema = !selectedThema || m.thema === selectedThema;
    return matchSearch && matchFach && matchThema;
  });

  /* ── STATS ─────────────────────────────────────────────── */
  const uFaecher = [...new Set(items.map(function (m) { return m.fach; }))].length;
  const uThemen  = [...new Set(items.map(function (m) { return m.thema; }))].length;
  statsRow.innerHTML =
    '<div class="stat-chip"><strong>' + items.length + '</strong>&nbsp;Materialien</div>' +
    '<div class="stat-chip"><strong>' + uFaecher + '</strong>&nbsp;Fächer</div>' +
    '<div class="stat-chip"><strong>' + uThemen  + '</strong>&nbsp;Themen</div>';

  /* ── THEMA-CHIPS (wenn Fach aktiv, keine Suche) ─────────── */
  if (selectedFach && !q) {
    const fachThemen = [...new Set(materialien
      .filter(function (m) { return m.fach === selectedFach; })
      .map(function (m) { return m.thema; }))];
    let chips = '<div class="thema-chips">';
    chips += '<button class="thema-chip' + (!selectedThema ? ' active' : '') +
             '" onclick="selectFolder(\'' + esc(selectedFach) + '\',null)">Alle</button>';
    fachThemen.forEach(function (t) {
      chips += '<button class="thema-chip' + (selectedThema === t ? ' active' : '') +
               '" onclick="selectFolder(\'' + esc(selectedFach) + '\',\'' + esc(t) + '\')">' + esc(t) + '</button>';
    });
    chips += '</div>';
    filterBar.innerHTML = chips;
  } else {
    filterBar.innerHTML = '';
  }

  /* ── EMPTY STATE ───────────────────────────────────────── */
  if (items.length === 0) {
    list.innerHTML =
      '<div class="empty-state">' +
      '<div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>' +
      '<h3>Keine Materialien gefunden</h3>' +
      '<p>Anderen Suchbegriff versuchen.</p>' +
      '</div>';
    return;
  }

  /* ── KARTEN-ANSICHT ────────────────────────────────────── */
  if (selectedThema || q) {
    // Flache Liste (Thema gewählt oder Suche)
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    items.forEach(function (m) { grid.appendChild(makeCard(m)); });
    list.appendChild(grid);

  } else if (selectedFach) {
    // Nach Thema gruppiert
    const themaMap = {};
    items.forEach(function (m) {
      if (!themaMap[m.thema]) themaMap[m.thema] = [];
      themaMap[m.thema].push(m);
    });
    const cls = getFachClass(selectedFach);
    Object.entries(themaMap).forEach(function ([thema, ms]) {
      const sec = document.createElement('div');
      sec.className = 'thema-section';
      sec.innerHTML =
        '<div class="thema-header ' + cls + '">' +
        '<span class="thema-badge">' + esc(thema) + '</span>' +
        '<span class="thema-count-badge">' + ms.length + ' Material' + (ms.length !== 1 ? 'ien' : '') + '</span>' +
        '</div>';
      const grid = document.createElement('div');
      grid.className = 'file-grid';
      ms.forEach(function (m) { grid.appendChild(makeCard(m)); });
      sec.appendChild(grid);
      list.appendChild(sec);
    });
  }
}

function makeCard(m) {
  const cls = getFachClass(m.fach);

  const card = document.createElement('a');
  card.className = 'file-card ' + cls;
  card.href = m.pfad;
  card.dataset.pfad = m.pfad;

  card.innerHTML =
    '<div class="file-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>' +
    '<div class="file-info">' +
    '  <div class="file-title">' + esc(m.name) + '</div>' +
    '  <div class="file-meta">' + esc(m.fach) + ' · ' + esc(m.thema) + ' · ' + esc(m.datum) + '</div>' +
    '</div>' +
    '<button class="card-copy-btn" title="Link kopieren" onclick="copyLink(event,\'' + esc(m.pfad) + '\')">' +
    '  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
    '    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>' +
    '    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>' +
    '  </svg>' +
    '</button>';

  // Edit-mode inline actions
  if (editMode) {
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:3px;flex-shrink:0;margin-left:4px;';
    const pfadSafe = m.pfad.replace(/'/g, "\\'");
    actions.innerHTML =
      '<button style="padding:3px 7px;border-radius:6px;border:1px solid #E5E9F2;background:#fff;font-size:0.7rem;cursor:pointer;color:#444;" ' +
      'onclick="event.preventDefault();event.stopPropagation();showRename(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Bearb.</button>' +
      '<button style="padding:3px 7px;border-radius:6px;border:1.5px solid #FECACA;background:#fff;font-size:0.7rem;cursor:pointer;color:#DC2626;" ' +
      'onclick="event.preventDefault();event.stopPropagation();showDelete(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Löschen</button>';
    card.appendChild(actions);
  }

  card.addEventListener('click', function (e) {
    e.preventDefault();
    showPreview(m);
  });

  if (previewMaterial && previewMaterial.pfad === m.pfad) {
    card.classList.add('active-preview');
  }

  return card;
}

function copyLink(e, pfad) {
  e.preventDefault();
  e.stopPropagation();
  navigator.clipboard.writeText(BASE_URL + pfad)
    .then(function () { showToast('Link kopiert!'); });
}

function showToken() {

  if (t) { localStorage.setItem('gh_token', t); showToast('Token gespeichert'); }

function getToken() { return localStorage.getItem('gh_token') || ''; }

/* ═══════════════════════════════════════════
   GITHUB API
═══════════════════════════════════════════ */
async function ghGet(path) {
  const r = await fetch(API + '/contents/' + path, {
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json'
    }
  });
  if (!r.ok) throw new Error('GitHub GET ' + path + ': ' + r.status + ' ' + r.statusText);
  return r.json();
}

async function ghPut(path, body) {
  const r = await fetch(API + '/contents/' + path, {
    method: 'PUT',
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(function () { return {}; });
    throw new Error(err.message || 'GitHub PUT ' + path + ': ' + r.status);
  }
  return r.json();
}

async function ghDelete(path, sha, message) {
  const r = await fetch(API + '/contents/' + path, {
    method: 'DELETE',
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: message, sha: sha })
  });
  if (!r.ok) throw new Error('GitHub DELETE ' + path + ': ' + r.status);
}

async function updateIndex(newData) {
  const fileInfo    = await ghGet('index.html');
  const rawContent  = atob(fileInfo.content.replace(/\n/g, ''));
  const updated     = rawContent.replace(
    /const materialien\s*=\s*\[[\s\S]*?\];/,
    'const materialien = ' + JSON.stringify(newData, null, 2) + ';'
  );
  await ghPut('index.html', {
    message: 'Update materialien index',
    content: btoa(unescape(encodeURIComponent(updated))),
    sha: fileInfo.sha
  });
}

/* ═══════════════════════════════════════════
   UPLOAD
═══════════════════════════════════════════ */
function showUpload() {
  uploadFile = null;
  document.getElementById('uploadTitel').value = '';
  document.getElementById('uploadFach').value  = '';
  document.getElementById('uploadThema').value = '';
  document.getElementById('dzText').textContent = 'HTML-Datei hierher ziehen oder klicken';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width    = '0%';
  document.getElementById('btnUpload').disabled         = false;
  document.getElementById('btnUpload').textContent      = 'Hochladen';
  openModal('modalUpload');
}

function fileChosen(e) {
  const f = e.target.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById('dzText').textContent = '✓ ' + f.name;
  if (!document.getElementById('uploadTitel').value)
    document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
}

function dzDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}
function dzDragLeave() {
  document.getElementById('dropZone').classList.remove('drag-over');
}
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    if (!document.getElementById('uploadTitel').value)
      document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
}

async function doUpload() {
  if (!uploadFile)   return showToast('Keine Datei ausgewählt');
  const titel = document.getElementById('uploadTitel').value.trim();
  const fach  = document.getElementById('uploadFach').value.trim();
  const thema = document.getElementById('uploadThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = 'Hochladen…';

  const pfad = 'materialien/' + fach + '/' + thema + '/' + uploadFile.name;
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  pw.style.display = 'block';
  pb.style.width = '25%';

  try {
    const content = await new Promise(function (res, rej) {
      const reader = new FileReader();
      reader.onload = function (e) { res(btoa(unescape(encodeURIComponent(e.target.result)))); };
      reader.onerror = rej;
      reader.readAsText(uploadFile);
    });
    pb.style.width = '55%';

    await ghPut(pfad, { message: 'Upload: ' + titel, content: content });
    pb.style.width = '75%';

    const today = new Date();
    const datum = today.getDate() + '.' + (today.getMonth() + 1) + '.' + today.getFullYear();
    materialien.push({ name: titel, fach: fach, thema: thema, pfad: pfad, datum: datum });
    await updateIndex(materialien);
    pb.style.width = '100%';

    setTimeout(function () {
      closeModal('modalUpload');
      buildSidebar();
      render(document.getElementById('search').value);
      showToast('"' + titel + '" hochgeladen');
      btn.disabled    = false;
      btn.textContent = 'Hochladen';
      pw.style.display = 'none';
      pb.style.width   = '0%';
    }, 400);
  } catch (e) {
    showToast('Fehler: ' + e.message);
    btn.disabled    = false;
    btn.textContent = 'Hochladen';
    pb.style.width  = '0%';
  }
}

/* ═══════════════════════════════════════════
   RENAME
═══════════════════════════════════════════ */
function showRename(m) {
  if (!m) return;
  renameTarget = m;
  document.getElementById('inputTitel').value = m.name;
  document.getElementById('inputFach').value  = m.fach;
  document.getElementById('inputThema').value = m.thema;
  openModal('modalRename');
}

async function doRename() {
  if (!renameTarget) return;
  const titel = document.getElementById('inputTitel').value.trim();
  const fach  = document.getElementById('inputFach').value.trim();
  const thema = document.getElementById('inputThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnSaveRename');
  btn.disabled = true;
  btn.textContent = 'Speichern…';

  const idx = materialien.indexOf(renameTarget);
  if (idx < 0) { btn.disabled = false; btn.textContent = 'Speichern'; return; }

  const oldPfad = renameTarget.pfad;
  const fileName = oldPfad.split('/').pop();
  const newPfad  = 'materialien/' + fach + '/' + thema + '/' + fileName;

  try {
    if (newPfad !== oldPfad) {
      const old = await ghGet(oldPfad);
      await ghPut(newPfad, {
        message: 'Move: ' + renameTarget.name + ' → ' + titel,
        content: old.content.replace(/\n/g, '')
      });
      await ghDelete(oldPfad, old.sha, 'Remove old: ' + oldPfad);
    }

    const updated = { name: titel, fach: fach, thema: thema, pfad: newPfad, datum: renameTarget.datum };
    materialien[idx] = updated;
    await updateIndex(materialien);

    closeModal('modalRename');
    buildSidebar();
    render(document.getElementById('search').value);
    if (previewMaterial && previewMaterial.pfad === oldPfad) showPreview(updated);
    renameTarget = null;
    showToast('Umbenannt zu "' + titel + '"');
  } catch (e) {
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Speichern';
  }
}

/* ═══════════════════════════════════════════
   DELETE
═══════════════════════════════════════════ */
function showDelete(m) {
  if (!m) return;
  deleteTarget = m;
  document.getElementById('deleteDesc').textContent =
    'Möchtest du "' + m.name + '" (' + m.fach + ' / ' + m.thema + ') wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.';
  openModal('modalDelete');
}

async function doDelete() {
  if (!deleteTarget) return;
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnConfirmDelete');
  btn.disabled    = true;
  btn.textContent = 'Löschen…';

  try {
    const fileInfo = await ghGet(deleteTarget.pfad);
    await ghDelete(deleteTarget.pfad, fileInfo.sha, 'Delete: ' + deleteTarget.name);

    const idx = materialien.indexOf(deleteTarget);
    if (idx >= 0) materialien.splice(idx, 1);
    await updateIndex(materialien);

    if (previewMaterial && previewMaterial.pfad === deleteTarget.pfad) closePreview();

    closeModal('modalDelete');
    buildSidebar();
    render(document.getElementById('search').value);
    showToast('"' + deleteTarget.name + '" gelöscht');
    deleteTarget = null;
  } catch (e) {
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Löschen';
  }
}

/* ═══════════════════════════════════════════
   GLOBAL DRAG & DROP
═══════════════════════════════════════════ */
let _dragCounter = 0;

document.addEventListener('dragenter', function (e) {
  if (e.dataTransfer && e.dataTransfer.types && e.dataTransfer.types.includes('Files')) {
    _dragCounter++;
    document.getElementById('dragOverlay').classList.add('active');
  }
});
document.addEventListener('dragleave', function () {
  _dragCounter--;
  if (_dragCounter <= 0) {
    _dragCounter = 0;
    document.getElementById('dragOverlay').classList.remove('active');
  }
});
document.addEventListener('dragover', function (e) { e.preventDefault(); });
document.addEventListener('drop', function (e) {
  e.preventDefault();
  _dragCounter = 0;
  document.getElementById('dragOverlay').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    showUpload();
    // Re-apply file info after modal opens
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    document.getElementById('uploadTitel').value  = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
});

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(function (m) {
      m.classList.remove('open');
    });
    closePreview();
    closeSidebar();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

buildSidebar();
