<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitale Unterrichtsmaterialien</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fc-0: #4F46E5; --fc-0-light: #EEF2FF; --fc-0-bg: #F5F3FF;
  --fc-1: #0891B2; --fc-1-light: #CFFAFE; --fc-1-bg: #ECFEFF;
  --fc-2: #EA580C; --fc-2-light: #FFEDD5; --fc-2-bg: #FFF7ED;
  --fc-3: #9333EA; --fc-3-light: #F3E8FF; --fc-3-bg: #FAF5FF;
  --fc-4: #1D4ED8; --fc-4-light: #DBEAFE; --fc-4-bg: #EFF6FF;
  --fc-5: #DB2777; --fc-5-light: #FCE7F3; --fc-5-bg: #FDF2F8;
  --fc-6: #6366F1; --fc-6-light: #E0E7FF; --fc-6-bg: #EEF2FF;
  --fc-7: #D97706; --fc-7-light: #FEF3C7; --fc-7-bg: #FFFBEB;

  --primary: #4F46E5;
  --primary-hover: #4338CA;
  --text: #1E1B4B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8F7FF;
  --bg-subtle: #F1F5F9;
  --white: #ffffff;
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(79,70,229,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(79,70,229,0.12), 0 2px 6px rgba(0,0,0,0.06);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

.fc-0 { --fc: var(--fc-0); --fc-light: var(--fc-0-light); --fc-bg: var(--fc-0-bg); }
.fc-1 { --fc: var(--fc-1); --fc-light: var(--fc-1-light); --fc-bg: var(--fc-1-bg); }
.fc-2 { --fc: var(--fc-2); --fc-light: var(--fc-2-light); --fc-bg: var(--fc-2-bg); }
.fc-3 { --fc: var(--fc-3); --fc-light: var(--fc-3-light); --fc-bg: var(--fc-3-bg); }
.fc-4 { --fc: var(--fc-4); --fc-light: var(--fc-4-light); --fc-bg: var(--fc-4-bg); }
.fc-5 { --fc: var(--fc-5); --fc-light: var(--fc-5-light); --fc-bg: var(--fc-5-bg); }
.fc-6 { --fc: var(--fc-6); --fc-light: var(--fc-6-light); --fc-bg: var(--fc-6-bg); }
.fc-7 { --fc: var(--fc-7); --fc-light: var(--fc-7-light); --fc-bg: var(--fc-7-bg); }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */
#app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 58px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(226,232,240,0.8);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 0.75rem;
  z-index: 30;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 0.93rem;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}
.logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #4F46E5 0%, #818CF8 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3);
}

.header-spacer { flex: 1; min-width: 0; }

#searchWrap {
  display: flex;
  align-items: center;
  background: var(--bg-subtle);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0 0.75rem;
  gap: 0.4rem;
  height: 38px;
  width: 220px;
  transition: all 200ms ease;
  flex-shrink: 0;
}
#searchWrap:focus-within {
  border-color: var(--primary);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
  width: 260px;
}
#searchWrap svg { color: var(--text-muted); flex-shrink: 0; }
#search {
  border: none;
  background: transparent;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  color: var(--text);
  width: 100%;
}
#search::placeholder { color: var(--text-muted); }

.hbtn {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0 0.8rem;
  height: 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  color: #475569;
  cursor: pointer;
  transition: all 200ms ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.hbtn:hover { background: var(--bg-subtle); border-color: #CBD5E1; color: var(--text); }
.hbtn.primary {
  background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
  color: var(--white);
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3);
  font-weight: 600;
}
.hbtn.primary:hover {
  background: linear-gradient(135deg, #4338CA 0%, #4F46E5 100%);
  box-shadow: 0 4px 12px rgba(79,70,229,0.4);
  transform: translateY(-1px);
}

#hamburger {
  display: none;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--white);
  cursor: pointer;
  flex-shrink: 0;
  color: #475569;
  transition: all 200ms ease;
}
#hamburger:hover { background: var(--bg-subtle); }

/* ─────────────────────────────────────────
   APP LAYOUT
───────────────────────────────────────── */
.app-layout {
  display: flex;
  height: calc(100vh - 58px);
  margin-top: 58px;
  overflow: hidden;
}

/* ─────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────── */
#sidebar {
  width: 248px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 200ms ease;
}

#sidebar-inner {
  overflow-y: auto;
  flex: 1;
  padding: 0.75rem 0 1rem;
}
#sidebar-inner::-webkit-scrollbar { width: 4px; }
#sidebar-inner::-webkit-scrollbar-track { background: transparent; }
#sidebar-inner::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

.sidebar-label {
  font-size: 0.62rem;
  font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0 1rem 0.6rem;
}

.sidebar-all {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.75rem;
  margin: 0 0.5rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 200ms ease;
  font-size: 0.84rem;
  font-weight: 500;
  color: #475569;
}
.sidebar-all:hover { background: var(--bg-subtle); color: var(--text); }
.sidebar-all.active { background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%); color: var(--primary); }

.all-icon {
  width: 24px; height: 24px;
  background: #EEF2FF;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
  flex-shrink: 0;
}
.sidebar-all.active .all-icon {
  background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
  color: white;
  box-shadow: 0 2px 6px rgba(79,70,229,0.3);
}

.sb-count {
  margin-left: auto;
  font-size: 0.68rem;
  background: var(--bg-subtle);
  color: var(--text-muted);
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
}
.sidebar-all.active .sb-count { background: rgba(79,70,229,0.12); color: var(--primary); }

.sb-divider { height: 1px; background: var(--border); margin: 0.5rem 0.75rem; }

.fach-group { margin-bottom: 1px; }

.fach-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.42rem 0.75rem;
  margin: 0 0.5rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 200ms ease;
  user-select: none;
}
.fach-header:hover { background: var(--bg-subtle); }
.fach-header.active { background: var(--fc-light); }

.fach-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--fc);
  flex-shrink: 0;
}

.fach-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: #334155;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fach-header.active .fach-name { color: var(--fc); }

.fach-chevron {
  color: #94A3B8;
  transition: transform 200ms ease;
  flex-shrink: 0;
}
.fach-chevron.open { transform: rotate(90deg); }

.thema-list { display: none; }
.thema-list.open { display: block; }

.thema-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.75rem 0.3rem 2.4rem;
  margin: 0 0.5rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.77rem;
  color: #64748B;
  transition: all 200ms ease;
}
.thema-item:hover { background: var(--bg-subtle); color: var(--text); }
.thema-item.active { background: var(--fc-light); color: var(--fc); font-weight: 600; }

.thema-item-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.thema-item-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--fc);
  flex-shrink: 0;
  opacity: 0.6;
}
.thema-item.active .thema-item-dot { opacity: 1; }

.ti-count {
  font-size: 0.67rem;
  color: #94A3B8;
  flex-shrink: 0;
  font-weight: 500;
}
.thema-item.active .ti-count { color: var(--fc); }

/* ─────────────────────────────────────────
   MAIN AREA
───────────────────────────────────────── */
#mainArea {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
  background: var(--bg);
}
#mainArea::-webkit-scrollbar { width: 6px; }
#mainArea::-webkit-scrollbar-track { background: transparent; }
#mainArea::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

.main-inner { padding: 1.5rem; }

/* Breadcrumb */
#breadcrumb {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.79rem;
  color: #94A3B8;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
#breadcrumb .bc-item {
  cursor: pointer;
  color: var(--primary);
  font-weight: 500;
  transition: color 200ms ease;
}
#breadcrumb .bc-item:hover { color: var(--primary-hover); text-decoration: underline; }
#breadcrumb .bc-sep { color: #CBD5E1; }
#breadcrumb .bc-cur { color: var(--text); font-weight: 600; }

/* Stats row */
#statsRow {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.stat-chip {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.3rem 0.75rem;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  box-shadow: var(--shadow-xs);
}
.stat-chip strong { color: var(--text); font-weight: 700; }

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin: 1.5rem 0 0.65rem;
}
.section-header:first-child { margin-top: 0; }

.section-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  background: var(--fc);
  flex-shrink: 0;
}
.section-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.section-sub { font-size: 0.73rem; color: var(--text-muted); font-weight: 400; }
.section-line { flex: 1; height: 1px; background: var(--border); }

.thema-section { margin-bottom: 0.25rem; }

.thema-header {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.5rem 0 0.4rem;
  margin-bottom: 0.4rem;
}
.thema-badge {
  font-size: 0.71rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: var(--fc-light);
  color: var(--fc);
}
.thema-count-badge { font-size: 0.69rem; color: var(--text-muted); }

/* File grid */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.7rem;
}

/* File card */
.file-card {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.85rem 1rem;
  background: var(--white);
  border: 1.5px solid rgba(226,232,240,0.8);
  border-left: 4px solid var(--fc);
  border-radius: var(--radius-lg);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: all 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.file-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
  border-color: rgba(226,232,240,0.8);
  border-left-color: var(--fc);
}
.file-card.active-preview {
  background: var(--fc-bg);
  border-left-color: var(--fc);
  border-color: var(--fc);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.file-icon {
  width: 40px; height: 40px;
  background: var(--fc-light);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--fc);
}

.file-info { flex: 1; min-width: 0; }

.file-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.2rem;
  letter-spacing: -0.01em;
}

.file-meta {
  font-size: 0.71rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-copy-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--white);
  cursor: pointer;
  color: #64748B;
  flex-shrink: 0;
  transition: all 200ms ease;
}
.card-copy-btn:hover { background: var(--fc-light); color: var(--fc); border-color: var(--fc); }
.file-card:hover .card-copy-btn { display: flex; }

/* Recent section */
.recent-section { margin-bottom: 1.5rem; }
.recent-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.recent-title {
  font-size: 0.7rem;
  font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ─────────────────────────────────────────
   PREVIEW PANEL
───────────────────────────────────────── */
#previewPanel {
  width: 0;
  flex-shrink: 0;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 220ms ease;
}
#previewPanel.open { width: 390px; }

.preview-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-subtle);
}

.preview-title {
  flex: 1;
  font-size: 0.875rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  letter-spacing: -0.01em;
}

.preview-close {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  line-height: 1;
  color: #64748B;
  flex-shrink: 0;
  transition: all 200ms ease;
}
.preview-close:hover { background: #FEF2F2; border-color: #FECACA; color: #DC2626; }

.preview-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.preview-fach-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
}

.preview-thema-txt { font-size: 0.74rem; color: #475569; }

.preview-date-txt { font-size: 0.71rem; color: #94A3B8; margin-left: auto; }

.preview-iframe-wrap {
  flex: 1;
  padding: 0.75rem;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#previewFrame {
  flex: 1;
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  min-height: 0;
}

.preview-footer {
  padding: 0.7rem 0.9rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  flex-shrink: 0;
  background: var(--bg-subtle);
}

.pv-btn {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.35rem 0.65rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.73rem;
  font-weight: 500;
  color: #475569;
  cursor: pointer;
  transition: all 200ms ease;
}
.pv-btn:hover { background: var(--bg-subtle); border-color: #CBD5E1; color: var(--text); }
.pv-btn.danger { color: #DC2626; border-color: #FECACA; }
.pv-btn.danger:hover { background: #FEF2F2; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  text-align: center;
  color: var(--text-muted);
}
.empty-icon {
  width: 56px; height: 56px;
  background: var(--bg-subtle);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: #94A3B8;
  margin-bottom: 1rem;
}
.empty-state h3 { font-size: 0.95rem; color: #475569; margin-bottom: 0.3rem; font-weight: 600; }
.empty-state p { font-size: 0.8rem; }

/* ─────────────────────────────────────────
   FILTER BAR (hidden, kept for DOM compat)
───────────────────────────────────────── */
#filterBar { display: none; }

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1E293B;
  color: var(--white);
  padding: 0.6rem 1.25rem;
  border-radius: 10px;
  font-size: 0.82rem;
  font-weight: 500;
  opacity: 0;
  transition: all 300ms ease;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─────────────────────────────────────────
   DRAG OVERLAY
───────────────────────────────────────── */
#dragOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(79,70,229,0.06);
  border: 3px dashed var(--primary);
  z-index: 50;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--primary);
  gap: 0.6rem;
}
#dragOverlay.active { display: flex; }

/* ─────────────────────────────────────────
   MODALS
───────────────────────────────────────── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.4);
  backdrop-filter: blur(4px);
  z-index: 60;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: var(--radius-xl);
  padding: 1.5rem;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
  animation: modalIn 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid rgba(226,232,240,0.6);
}
@keyframes modalIn {
  from { transform: scale(0.92) translateY(8px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.modal h2 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 1.1rem;
  color: var(--text);
  letter-spacing: -0.02em;
}

.modal label {
  display: block;
  font-size: 0.76rem;
  font-weight: 600;
  color: #475569;
  margin-bottom: 0.3rem;
  margin-top: 0.8rem;
}
.modal label:first-of-type { margin-top: 0; }

.modal input, .modal select {
  width: 100%;
  padding: 0.52rem 0.8rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  color: var(--text);
  background: var(--bg-subtle);
  outline: none;
  transition: all 200ms ease;
}
.modal input:focus, .modal select:focus {
  border-color: var(--primary);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
}

.modal-footer {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.25rem;
  justify-content: flex-end;
}

.btn-secondary {
  padding: 0.52rem 1rem;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: #475569;
  cursor: pointer;
  transition: all 200ms ease;
}
.btn-secondary:hover { background: var(--bg-subtle); color: var(--text); }

.btn-primary {
  padding: 0.52rem 1.25rem;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--white);
  cursor: pointer;
  transition: all 200ms ease;
  box-shadow: 0 2px 8px rgba(79,70,229,0.25);
}
.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-hover) 0%, var(--primary) 100%);
  box-shadow: 0 4px 12px rgba(79,70,229,0.35);
  transform: translateY(-1px);
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-danger {
  padding: 0.52rem 1.25rem;
  border-radius: var(--radius-sm);
  border: none;
  background: #DC2626;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--white);
  cursor: pointer;
  transition: all 200ms ease;
  box-shadow: 0 2px 8px rgba(220,38,38,0.25);
}
.btn-danger:hover {
  background: #B91C1C;
  box-shadow: 0 4px 12px rgba(220,38,38,0.35);
  transform: translateY(-1px);
}

/* Drop zone */
#dropZone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 200ms ease;
  margin-bottom: 0.75rem;
  background: var(--bg-subtle);
}
#dropZone:hover, #dropZone.drag-over { border-color: var(--primary); background: #EEF2FF; }
#dzText { font-size: 0.81rem; color: var(--text-muted); }
#fileInput { display: none; }

#progressWrap {
  display: none;
  background: var(--bg-subtle);
  border-radius: 6px;
  overflow: hidden;
  height: 6px;
  margin-top: 0.6rem;
}
#progressBar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary) 0%, #818CF8 100%);
  border-radius: 6px;
  width: 0%;
  transition: width 300ms ease;
}

.token-info { font-size: 0.79rem; color: #64748B; margin-bottom: 0.75rem; line-height: 1.6; }

/* Edit mode */
body.edit-mode .file-card { outline: 2px dashed rgba(79,70,229,0.3); outline-offset: -2px; }

/* ─────────────────────────────────────────
   MOBILE SIDEBAR OVERLAY
───────────────────────────────────────── */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.3);

<script>
/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const OWNER   = 'brandy299';
const REPO    = 'HTML-materialien';
const API     = `https://api.github.com/repos/${OWNER}/${REPO}`;
const BASE_URL = `https://${OWNER}.github.io/${REPO}/`;

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const materialien = [
  {"name":"business letters lernpfad","fach":"Englisch B2","thema":"Business Letters","pfad":"materialien/Englisch B2/Business Letters/business-letters-lernpfad.html","datum":"17.03.2026"},
  {"name":"LF5 Einstieg Interaktiv","fach":"GPU","thema":"LF5","pfad":"materialien/GPU/LF5/LF5_Einstieg_Interaktiv.html","datum":"16.03.2026"},
  {"name":"LF5 Präsentation","fach":"GPU","thema":"LF5","pfad":"materialien/GPU/LF5/LF5_Praesentation_1.html","datum":"17.03.2026"},
  {"name":"adjectives vs adverbs","fach":"Englisch B1","thema":"adjectives vs adverbs","pfad":"materialien/Englisch B1/adjectives vs adverbs/adjectives-vs-adverbs.html","datum":"17.3.2026"},
  {"name":"Preiskalkulation Lernseite","fach":"GPU","thema":"Preiskalkulation","pfad":"materialien/GPU/Preiskalkulation/Preiskalkulation_Lernseite.html","datum":"17.3.2026"},
  {"name":"LF8 Interaktiv","fach":"PBP","thema":"Personalmaßnahmen","pfad":"materialien/PBP/Personalmaßnahmen/LF8_Interaktiv.html","datum":"17.3.2026"},
  {"name":"LF8 Präsentation","fach":"PBP","thema":"Personalmaßnahmen","pfad":"materialien/PBP/Personalmaßnahmen/LF8_Praesentation.html","datum":"17.3.2026"},
  {"name":"telephoning Lernpfad","fach":"Englisch B2","thema":"telephoning","pfad":"materialien/Englisch B2/telephoning/telephoning-lernpfad.html","datum":"17.3.2026"},
  {"name":"complaint call quiz","fach":"Englisch B2","thema":"telephoning","pfad":"materialien/Englisch B2/telephoning/complaint-call-quiz.html","datum":"17.3.2026"},
  {"name":"visitor reception simulator","fach":"Englisch B2","thema":"small talk","pfad":"materialien/Englisch B2/small talk/visitor-reception-simulator_1.html","datum":"17.3.2026"}
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let editMode      = false;
let renameTarget  = null;
let deleteTarget  = null;
let uploadFile    = null;
let activeFilter  = null;

let selectedFach    = null;
let selectedThema   = null;
let previewMaterial = null;

/* ═══════════════════════════════════════════
   FACH COLOR MAP
═══════════════════════════════════════════ */
const _fachColorMap = {};

function getFachClass(fach) {
  if (!_fachColorMap[fach]) {
    const n = Object.keys(_fachColorMap).length;
    _fachColorMap[fach] = 'fc-' + (n % 8);
  }
  return _fachColorMap[fach];
}

// Stable color seeding in data order
(function () {
  const seen = [];
  materialien.forEach(m => { if (!seen.includes(m.fach)) seen.push(m.fach); });
  seen.forEach(f => getFachClass(f));
})();

const COLOR_VALUES = {
  'fc-0': { color: '#4F46E5', light: '#EEF2FF', bg: '#F5F3FF' },
  'fc-1': { color: '#0891B2', light: '#CFFAFE', bg: '#ECFEFF' },
  'fc-2': { color: '#EA580C', light: '#FFEDD5', bg: '#FFF7ED' },
  'fc-3': { color: '#9333EA', light: '#F3E8FF', bg: '#FAF5FF' },
  'fc-4': { color: '#1D4ED8', light: '#DBEAFE', bg: '#EFF6FF' },
  'fc-5': { color: '#DB2777', light: '#FCE7F3', bg: '#FDF2F8' },
  'fc-6': { color: '#6366F1', light: '#E0E7FF', bg: '#EEF2FF' },
  'fc-7': { color: '#D97706', light: '#FEF3C7', bg: '#FFFBEB' },
};

function cv(cls) { return COLOR_VALUES[cls] || COLOR_VALUES['fc-0']; }

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
function buildSidebar() {
  const tree = document.getElementById('sidebar-tree');
  document.getElementById('sidebarAllCount').textContent = materialien.length;

  const allEl = document.getElementById('sidebarAll');
  allEl.classList.toggle('active', selectedFach === null && selectedThema === null);

  // Build fach → thema → count map
  const fachMap = {};
  materialien.forEach(m => {
    if (!fachMap[m.fach]) fachMap[m.fach] = {};
    fachMap[m.fach][m.thema] = (fachMap[m.fach][m.thema] || 0) + 1;
  });

  tree.innerHTML = '';

  Object.entries(fachMap).forEach(([fach, themen]) => {
    const cls = getFachClass(fach);
    const fachTotal = Object.values(themen).reduce((a, b) => a + b, 0);
    const isFachActive = selectedFach === fach && !selectedThema;
    const isExpanded = selectedFach === fach;

    const group = document.createElement('div');
    group.className = 'fach-group ' + cls;

    const header = document.createElement('div');
    header.className = 'fach-header' + (isFachActive ? ' active' : '');
    header.innerHTML =
      '<span class="fach-dot"></span>' +
      '<span class="fach-name">' + esc(fach) + '</span>' +
      '<span class="sb-count">' + fachTotal + '</span>' +
      '<svg class="fach-chevron' + (isExpanded ? ' open' : '') + '" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';

    header.addEventListener('click', function (e) {
      e.stopPropagation();
      const list = group.querySelector('.thema-list');
      const chevron = header.querySelector('.fach-chevron');
      const opening = !list.classList.contains('open');
      list.classList.toggle('open', opening);
      chevron.classList.toggle('open', opening);
      selectFolder(opening ? fach : null, null);
    });

    const themaListEl = document.createElement('div');
    themaListEl.className = 'thema-list' + (isExpanded ? ' open' : '');

    Object.entries(themen).forEach(([thema, count]) => {
      const isThemaActive = selectedFach === fach && selectedThema === thema;
      const item = document.createElement('div');
      item.className = 'thema-item' + (isThemaActive ? ' active' : '');
      item.innerHTML =
        '<span class="thema-item-dot"></span>' +
        '<span class="thema-item-label">' + esc(thema) + '</span>' +
        '<span class="ti-count">' + count + '</span>';
      item.addEventListener('click', function (e) {
        e.stopPropagation();
        selectFolder(fach, thema);
      });
      themaListEl.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(themaListEl);
    tree.appendChild(group);
  });

  // Populate datalists
  const fachDL = document.getElementById('fachList');
  fachDL.innerHTML = '';
  Object.keys(fachMap).forEach(f => {
    const o = document.createElement('option');
    o.value = f;
    fachDL.appendChild(o);
  });

  const themaDL = document.getElementById('themaList');
  themaDL.innerHTML = '';
  const allThemen = [...new Set(materialien.map(m => m.thema))];
  allThemen.forEach(t => {
    const o = document.createElement('option');
    o.value = t;
    themaDL.appendChild(o);
  });
}

function selectFolder(fach, thema) {
  selectedFach = fach;
  selectedThema = thema;
  buildSidebar();
  render(document.getElementById('search').value);
  updateBreadcrumb();
  closePreview();
  // Close mobile sidebar after selection
  if (window.innerWidth < 768) closeSidebar();

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<span class="bc-item" onclick="selectFolder(null,null)">Alle</span>';
  if (selectedFach) {
    html += '<span class="bc-sep">›</span>';
    if (selectedThema) {
      html += '<span class="bc-item" onclick="selectFolder(\'' + esc(selectedFach) + '\',null)">' + esc(selectedFach) + '</span>';
      html += '<span class="bc-sep">›</span>';
      html += '<span class="bc-cur">' + esc(selectedThema) + '</span>';
    } else {
      html += '<span class="bc-cur">' + esc(selectedFach) + '</span>';
    }
  }
  bc.innerHTML = html;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render(query) {
  if (query === undefined) query = '';
  const q = query.toLowerCase().trim();

  const list     = document.getElementById('fileList');
  const statsRow = document.getElementById('statsRow');

  // Filter items
  const items = materialien.filter(function (m) {
    const matchSearch = !q ||
      m.name.toLowerCase().includes(q) ||
      m.fach.toLowerCase().includes(q) ||
      m.thema.toLowerCase().includes(q);
    const matchFach  = !selectedFach  || m.fach  === selectedFach;
    const matchThema = !selectedThema || m.thema === selectedThema;
    return matchSearch && matchFach && matchThema;
  });

  // Stats
  const uFaecher = [...new Set(items.map(function (m) { return m.fach; }))].length;
  const uThemen  = [...new Set(items.map(function (m) { return m.thema; }))].length;
  statsRow.innerHTML =
    '<div class="stat-chip"><strong>' + items.length + '</strong>&nbsp;Materialien</div>' +
    '<div class="stat-chip"><strong>' + uFaecher + '</strong>&nbsp;Fächer</div>' +
    '<div class="stat-chip"><strong>' + uThemen  + '</strong>&nbsp;Themen</div>';

  list.innerHTML = '';

  if (items.length === 0) {
    list.innerHTML =
      '<div class="empty-state">' +
      '<div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>' +
      '<h3>Keine Materialien gefunden</h3>' +
      '<p>Anderen Suchbegriff versuchen oder anderen Ordner wählen.</p>' +
      '</div>';
    return;
  }

  // "Zuletzt hinzugefügt" — only when viewing all without search
  if (!selectedFach && !selectedThema && !q) {
    const recent = materialien.slice(-3).reverse();
    const recSec = document.createElement('div');
    recSec.className = 'recent-section';
    recSec.innerHTML = '<div class="recent-header"><span class="recent-title">Zuletzt hinzugefügt</span></div>';
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    recent.forEach(function (m) { grid.appendChild(makeCard(m)); });
    recSec.appendChild(grid);
    list.appendChild(recSec);
  }

  if (selectedThema) {
    // Flat list
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    items.forEach(function (m) { grid.appendChild(makeCard(m)); });
    list.appendChild(grid);

  } else if (selectedFach) {
    // Group by thema
    const themaMap = {};
    items.forEach(function (m) {
      if (!themaMap[m.thema]) themaMap[m.thema] = [];
      themaMap[m.thema].push(m);
    });
    const cls = getFachClass(selectedFach);
    Object.entries(themaMap).forEach(function ([thema, ms]) {
      const sec = document.createElement('div');
      sec.className = 'thema-section';
      sec.innerHTML =
        '<div class="thema-header ' + cls + '">' +
        '<span class="thema-badge">' + esc(thema) + '</span>' +
        '<span class="thema-count-badge">' + ms.length + ' Material' + (ms.length !== 1 ? 'ien' : '') + '</span>' +
        '</div>';
      const grid = document.createElement('div');
      grid.className = 'file-grid';
      ms.forEach(function (m) { grid.appendChild(makeCard(m)); });
      sec.appendChild(grid);
      list.appendChild(sec);
    });

  } else {
    // Group by fach then thema
    const fachMap = {};
    items.forEach(function (m) {
      if (!fachMap[m.fach]) fachMap[m.fach] = {};
      if (!fachMap[m.fach][m.thema]) fachMap[m.fach][m.thema] = [];
      fachMap[m.fach][m.thema].push(m);
    });

    Object.entries(fachMap).forEach(function ([fach, themen]) {
      const cls   = getFachClass(fach);
      const total = Object.values(themen).flat().length;

      const fachSec  = document.createElement('div');
      const secHead  = document.createElement('div');
      secHead.className = 'section-header ' + cls;
      secHead.innerHTML =
        '<span class="section-dot"></span>' +
        '<span class="section-title">' + esc(fach) + '</span>' +
        '<span class="section-sub">' + total + ' Material' + (total !== 1 ? 'ien' : '') + '</span>' +
        '<span class="section-line"></span>';
      fachSec.appendChild(secHead);

      Object.entries(themen).forEach(function ([thema, ms]) {
        const sec = document.createElement('div');
        sec.className = 'thema-section';
        sec.innerHTML =
          '<div class="thema-header ' + cls + '">' +
          '<span class="thema-badge">' + esc(thema) + '</span>' +
          '<span class="thema-count-badge">' + ms.length + ' Material' + (ms.length !== 1 ? 'ien' : '') + '</span>' +
          '</div>';
        const grid = document.createElement('div');
        grid.className = 'file-grid';
        ms.forEach(function (m) { grid.appendChild(makeCard(m)); });
        sec.appendChild(grid);
        fachSec.appendChild(sec);
      });

      list.appendChild(fachSec);
    });
  }
}

function makeCard(m) {
  const cls = getFachClass(m.fach);

  const card = document.createElement('a');
  card.className = 'file-card ' + cls;
  card.href = m.pfad;
  card.dataset.pfad = m.pfad;

  card.innerHTML =
    '<div class="file-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>' +
    '<div class="file-info">' +
    '  <div class="file-title">' + esc(m.name) + '</div>' +
    '  <div class="file-meta">' + esc(m.fach) + ' · ' + esc(m.thema) + ' · ' + esc(m.datum) + '</div>' +
    '</div>' +
    '<button class="card-copy-btn" title="Link kopieren" onclick="copyLink(event,\'' + esc(m.pfad) + '\')">' +
    '  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
    '    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>' +
    '    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>' +
    '  </svg>' +
    '</button>';

  // Edit-mode inline actions
  if (editMode) {
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:3px;flex-shrink:0;margin-left:4px;';
    const pfadSafe = m.pfad.replace(/'/g, "\\'");
    actions.innerHTML =
      '<button style="padding:3px 7px;border-radius:6px;border:1px solid #E5E9F2;background:#fff;font-size:0.7rem;cursor:pointer;color:#444;" ' +
      'onclick="event.preventDefault();event.stopPropagation();showRename(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Bearb.</button>' +
      '<button style="padding:3px 7px;border-radius:6px;border:1.5px solid #FECACA;background:#fff;font-size:0.7rem;cursor:pointer;color:#DC2626;" ' +
      'onclick="event.preventDefault();event.stopPropagation();showDelete(materialien.find(x=>x.pfad===\'' + pfadSafe + '\'))">Löschen</button>';
    card.appendChild(actions);
  }

  card.addEventListener('click', function (e) {
    e.preventDefault();
    showPreview(m);
  });

  if (previewMaterial && previewMaterial.pfad === m.pfad) {
    card.classList.add('active-preview');
  }

  return card;
}

function copyLink(e, pfad) {
  e.preventDefault();
  e.stopPropagation();
  navigator.clipboard.writeText(BASE_URL + pfad)
    .then(function () { showToast('Link kopiert!'); });
}

/* ═══════════════════════════════════════════
   GITHUB API
═══════════════════════════════════════════ */
async function ghGet(path) {
  const r = await fetch(API + '/contents/' + path, {
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json'
    }
  });
  if (!r.ok) throw new Error('GitHub GET ' + path + ': ' + r.status + ' ' + r.statusText);
  return r.json();
}

async function ghPut(path, body) {
  const r = await fetch(API + '/contents/' + path, {
    method: 'PUT',
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(function () { return {}; });
    throw new Error(err.message || 'GitHub PUT ' + path + ': ' + r.status);
  }
  return r.json();
}

async function ghDelete(path, sha, message) {
  const r = await fetch(API + '/contents/' + path, {
    method: 'DELETE',
    headers: {
      Authorization: 'token ' + getToken(),
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: message, sha: sha })
  });
  if (!r.ok) throw new Error('GitHub DELETE ' + path + ': ' + r.status);
}

async function updateIndex(newData) {
  const fileInfo    = await ghGet('index.html');
  const rawContent  = atob(fileInfo.content.replace(/\n/g, ''));
  const updated     = rawContent.replace(
    /const materialien\s*=\s*\[[\s\S]*?\];/,
    'const materialien = ' + JSON.stringify(newData, null, 2) + ';'
  );
  await ghPut('index.html', {
    message: 'Update materialien index',
    content: btoa(unescape(encodeURIComponent(updated))),
    sha: fileInfo.sha
  });
}

function showUpload() {
  uploadFile = null;
  document.getElementById('uploadTitel').value = '';
  document.getElementById('uploadFach').value  = '';
  document.getElementById('uploadThema').value = '';
  document.getElementById('dzText').textContent = 'HTML-Datei hierher ziehen oder klicken';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width    = '0%';
  document.getElementById('btnUpload').disabled         = false;
  document.getElementById('btnUpload').textContent      = 'Hochladen';

}

function fileChosen(e) {
  const f = e.target.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById('dzText').textContent = '✓ ' + f.name;
  if (!document.getElementById('uploadTitel').value)
    document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
}

function dzDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}
function dzDragLeave() {
  document.getElementById('dropZone').classList.remove('drag-over');
}
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    if (!document.getElementById('uploadTitel').value)
      document.getElementById('uploadTitel').value = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
}

async function doUpload() {
  if (!uploadFile)   return showToast('Keine Datei ausgewählt');
  const titel = document.getElementById('uploadTitel').value.trim();
  const fach  = document.getElementById('uploadFach').value.trim();
  const thema = document.getElementById('uploadThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = 'Hochladen…';

  const pfad = 'materialien/' + fach + '/' + thema + '/' + uploadFile.name;
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  pw.style.display = 'block';
  pb.style.width = '25%';

  try {
    const content = await new Promise(function (res, rej) {
      const reader = new FileReader();
      reader.onload = function (e) { res(btoa(unescape(encodeURIComponent(e.target.result)))); };
      reader.onerror = rej;
      reader.readAsText(uploadFile);
    });
    pb.style.width = '55%';

    await ghPut(pfad, { message: 'Upload: ' + titel, content: content });
    pb.style.width = '75%';

    const today = new Date();
    const datum = today.getDate() + '.' + (today.getMonth() + 1) + '.' + today.getFullYear();
    materialien.push({ name: titel, fach: fach, thema: thema, pfad: pfad, datum: datum });
    await updateIndex(materialien);
    pb.style.width = '100%';

    setTimeout(function () {
      closeModal('modalUpload');
      buildSidebar();
      render(document.getElementById('search').value);
      showToast('"' + titel + '" hochgeladen');
      btn.disabled    = false;
      btn.textContent = 'Hochladen';
      pw.style.display = 'none';
      pb.style.width   = '0%';
    }, 400);
  } catch (e) {
    showToast('Fehler: ' + e.message);
    btn.disabled    = false;
    btn.textContent = 'Hochladen';
    pb.style.width  = '0%';
  }
}

/* ═══════════════════════════════════════════
   RENAME
═══════════════════════════════════════════ */
function showRename(m) {
  if (!m) return;
  renameTarget = m;
  document.getElementById('inputTitel').value = m.name;
  document.getElementById('inputFach').value  = m.fach;
  document.getElementById('inputThema').value = m.thema;
  openModal('modalRename');
}

async function doRename() {
  if (!renameTarget) return;
  const titel = document.getElementById('inputTitel').value.trim();
  const fach  = document.getElementById('inputFach').value.trim();
  const thema = document.getElementById('inputThema').value.trim();
  if (!titel || !fach || !thema) return showToast('Bitte alle Felder ausfüllen');
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnSaveRename');
  btn.disabled = true;
  btn.textContent = 'Speichern…';

  const idx = materialien.indexOf(renameTarget);
  if (idx < 0) { btn.disabled = false; btn.textContent = 'Speichern'; return; }

  const oldPfad = renameTarget.pfad;
  const fileName = oldPfad.split('/').pop();
  const newPfad  = 'materialien/' + fach + '/' + thema + '/' + fileName;

  try {
    if (newPfad !== oldPfad) {
      const old = await ghGet(oldPfad);
      await ghPut(newPfad, {
        message: 'Move: ' + renameTarget.name + ' → ' + titel,
        content: old.content.replace(/\n/g, '')
      });
      await ghDelete(oldPfad, old.sha, 'Remove old: ' + oldPfad);
    }

    const updated = { name: titel, fach: fach, thema: thema, pfad: newPfad, datum: renameTarget.datum };
    materialien[idx] = updated;
    await updateIndex(materialien);

    closeModal('modalRename');
    buildSidebar();
    render(document.getElementById('search').value);
    if (previewMaterial && previewMaterial.pfad === oldPfad) showPreview(updated);
    renameTarget = null;
    showToast('Umbenannt zu "' + titel + '"');
  } catch (e) {
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Speichern';
  }
}

/* ═══════════════════════════════════════════
   DELETE
═══════════════════════════════════════════ */
function showDelete(m) {
  if (!m) return;
  deleteTarget = m;
  document.getElementById('deleteDesc').textContent =
    'Möchtest du "' + m.name + '" (' + m.fach + ' / ' + m.thema + ') wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.';
  openModal('modalDelete');
}

async function doDelete() {
  if (!deleteTarget) return;
  if (!getToken()) return showToast('Bitte zuerst GitHub Token setzen (⚙️)');

  const btn = document.getElementById('btnConfirmDelete');
  btn.disabled    = true;
  btn.textContent = 'Löschen…';

  try {
    const fileInfo = await ghGet(deleteTarget.pfad);
    await ghDelete(deleteTarget.pfad, fileInfo.sha, 'Delete: ' + deleteTarget.name);

    const idx = materialien.indexOf(deleteTarget);
    if (idx >= 0) materialien.splice(idx, 1);
    await updateIndex(materialien);

    if (previewMaterial && previewMaterial.pfad === deleteTarget.pfad) closePreview();

    closeModal('modalDelete');
    buildSidebar();
    render(document.getElementById('search').value);
    showToast('"' + deleteTarget.name + '" gelöscht');
    deleteTarget = null;
  } catch (e) {
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Löschen';
  }
}

let _dragCounter = 0;

document.addEventListener('dragenter', function (e) {
  if (e.dataTransfer && e.dataTransfer.types && e.dataTransfer.types.includes('Files')) {
    _dragCounter++;
    document.getElementById('dragOverlay').classList.add('active');

    document.getElementById('dragOverlay').classList.remove('active');
  }
});
document.addEventListener('dragover', function (e) { e.preventDefault(); });
document.addEventListener('drop', function (e) {
  e.preventDefault();
  _dragCounter = 0;
  document.getElementById('dragOverlay').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.html')) {
    uploadFile = f;
    showUpload();
    // Re-apply file info after modal opens
    document.getElementById('dzText').textContent = '✓ ' + f.name;
    document.getElementById('uploadTitel').value  = f.name.replace(/\.html?$/i, '');
  } else if (f) {
    showToast('Nur HTML-Dateien erlaubt');
  }
});

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(function (m) {
      m.classList.remove('open');
    });
    closePreview();
    closeSidebar();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
buildSidebar();
render('');
updateBreadcrumb();
</script>
</body>
</html>
